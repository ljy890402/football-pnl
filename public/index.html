<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="足球盈亏">
<meta name="theme-color" content="#0f172a">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="apple-touch-icon.png">
<link rel="icon" type="image/png" href="icon-192.png">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>足球注单分析系统 v3</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:sans-serif;background:#0f172a;color:#e2e8f0;min-height:100vh}
.app{display:flex;height:100vh;overflow:hidden}
.sb{width:260px;background:#1e293b;border-right:1px solid #334155;display:flex;flex-direction:column;position:relative;flex-shrink:0}
.main{flex:1;display:flex;flex-direction:column;overflow:hidden;min-width:0}
.sb-h{padding:12px 16px;border-bottom:1px solid #334155;display:flex;align-items:center;justify-content:space-between;flex-shrink:0}
.sb-h h2{font-size:15px;color:#38bdf8;margin:0}
.btn{padding:8px 14px;border:none;border-radius:6px;cursor:pointer;font-size:14px;font-weight:500;min-height:36px}
.btn-a{background:#38bdf8;color:#0f172a}
.ml{flex:1;overflow-y:auto;padding:8px;-webkit-overflow-scrolling:touch}
.mi{padding:10px 12px;margin-bottom:6px;background:#0f172a;border:1px solid #334155;border-radius:8px;cursor:pointer;transition:all .15s;font-size:14px}
.mi:hover{border-color:#38bdf8}
.mi.act{border-color:#38bdf8;background:#1e3a5f}
.mi .t{font-weight:600;margin-bottom:3px}
.mi .i{font-size:12px;color:#94a3b8}
.mi .c{font-size:12px;color:#38bdf8;margin-top:3px}
.del{float:right;background:none;border:none;color:#ef4444;cursor:pointer;font-size:14px;padding:2px 6px}
.tabs{display:flex;background:#1e293b;border-bottom:1px solid #334155;overflow-x:auto;-webkit-overflow-scrolling:touch;flex-shrink:0}
.tab{padding:12px 16px;cursor:pointer;color:#94a3b8;border-bottom:2px solid transparent;white-space:nowrap;font-size:14px;flex-shrink:0}
.tab.act{color:#38bdf8;border-bottom-color:#38bdf8}
.content{flex:1;overflow-y:auto;padding:16px;-webkit-overflow-scrolling:touch;min-width:0}
input,select{width:100%;padding:10px 12px;background:#1e293b;border:1px solid #334155;border-radius:6px;color:#e2e8f0;font-size:14px;min-height:36px}
input:focus,select:focus{border-color:#38bdf8;outline:none}
table{width:100%;border-collapse:collapse;font-size:13px;margin:10px 0}
th{background:#1e293b;padding:8px 10px;text-align:left;color:#94a3b8;border-bottom:1px solid #334155;white-space:nowrap}
td{padding:8px 10px;border-bottom:1px solid #1e293b;white-space:nowrap}
tr:hover{background:#1e293b}
.tag{display:inline-block;padding:2px 8px;border-radius:4px;font-size:11px}
.t-w{background:#22c55e22;color:#22c55e}
.t-l{background:#ef444422;color:#ef4444}
.t-p{background:#f59e0b22;color:#f59e0b}
.t-pn{background:#94a3b822;color:#94a3b8}
.sg{display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:10px;margin:14px 0}
.sc{background:#1e293b;border:1px solid #334155;border-radius:8px;padding:14px;text-align:center}
.sc .v{font-size:22px;font-weight:700;color:#38bdf8}
.sc .l{font-size:11px;color:#94a3b8;margin-top:4px}
.modal-o{position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,.7);display:flex;align-items:center;justify-content:center;z-index:1000;padding:16px}
.modal{background:#1e293b;border:1px solid #334155;border-radius:12px;padding:20px;max-width:500px;width:100%;max-height:90vh;overflow-y:auto}
.pnl-m{display:flex;flex-wrap:wrap;gap:2px;margin:12px 0}
.pc{width:54px;height:42px;display:flex;flex-direction:column;align-items:center;justify-content:center;font-size:10px;font-weight:600;border-radius:4px;cursor:pointer}
.pc:hover{transform:scale(1.12)}
.ht-badge{display:inline-block;padding:2px 6px;background:#f59e0b33;color:#f59e0b;border-radius:4px;font-size:11px;margin-left:4px}

/* === 手机适配 === */
.ham{display:none;position:fixed;top:8px;left:8px;z-index:999;background:#1e293b;border:1px solid #334155;color:#38bdf8;font-size:20px;width:38px;height:38px;border-radius:8px;cursor:pointer;align-items:center;justify-content:center}
.sb-ov{display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,.5);z-index:899}
@media(max-width:768px){
  .ham{display:flex}
  .sb{position:fixed;top:0;left:0;height:100%;z-index:900;transform:translateX(-100%);transition:transform .2s;width:260px}
  .sb.show{transform:translateX(0)}
  .sb-ov.show{display:block}
  .main .tabs{padding-left:50px}
  .content{padding:12px}
  table{display:block;overflow-x:auto;-webkit-overflow-scrolling:touch;white-space:nowrap;font-size:12px}
  th,td{padding:6px 8px}
  .sg{grid-template-columns:repeat(2,1fr)}
  .btn{font-size:13px;padding:8px 10px}
  input,select{font-size:16px;padding:10px 10px}
  .modal{width:calc(100% - 32px);max-height:85vh}
}
@media(max-width:380px){
  .sg{grid-template-columns:1fr 1fr}
  .tab{padding:10px 10px;font-size:12px}
}
/* === 登录页 === */
.login-wrap{position:fixed;top:0;left:0;width:100%;height:100%;background:#0f172a;display:flex;align-items:center;justify-content:center;z-index:9999;flex-direction:column;padding:20px}
.login-card{background:#1e293b;border:1px solid #334155;border-radius:16px;padding:40px 32px;max-width:400px;width:100%;text-align:center}
.login-card h1{color:#38bdf8;font-size:24px;margin-bottom:4px}
.login-card .sub{color:#94a3b8;font-size:13px;margin-bottom:24px}
.login-card label{display:block;text-align:left;font-size:13px;color:#94a3b8;margin-bottom:4px;margin-top:12px}
.login-card input{margin-bottom:4px}
.login-card .err{color:#ef4444;font-size:12px;min-height:18px;margin-top:4px}
.login-card .btn{width:100%;margin-top:8px;font-size:16px;padding:12px}
.login-card .info{color:#64748b;font-size:11px;margin-top:16px;line-height:1.6}
/* === 权限隐藏 === */
.admin-only{display:none}.role-admin .admin-only{display:unset}
.role-admin .admin-only-btn{display:inline-block}.role-finance .admin-only-btn{display:none}
.role-admin .admin-only-flex{display:flex}.role-finance .admin-only-flex{display:none}
.tab-admin{display:none}.role-admin .tab-admin{display:inline-block}
.role-finance .tab-admin-content{display:none}
/* === 用户信息条 === */
.user-bar{padding:8px 16px;border-bottom:1px solid #334155;display:flex;align-items:center;justify-content:space-between;font-size:12px;flex-shrink:0}
.user-bar .uinfo{display:flex;align-items:center;gap:6px}
.user-bar .urole{padding:2px 8px;border-radius:4px;font-size:10px;font-weight:600}
.urole-admin{background:#22c55e22;color:#22c55e}
.urole-finance{background:#f59e0b22;color:#f59e0b}
.user-bar .logout-btn{background:none;border:1px solid #ef4444;color:#ef4444;padding:4px 10px;border-radius:4px;cursor:pointer;font-size:11px}
</style>
</head>
<body>
<!-- ===== 登录页 ===== -->
<div class="login-wrap" id="loginWrap">
  <div class="login-card">
    <h1>⚽ 足球注单分析</h1>
    <div class="sub">请登录以继续</div>
    <label>用户名</label>
    <input id="loginUser" placeholder="请输入用户名" autocomplete="username">
    <label>密码</label>
    <input id="loginPass" type="password" placeholder="请输入密码" autocomplete="current-password">
    <div class="err" id="loginErr"></div>
    <button class="btn btn-a" style="margin-top:16px" onclick="doLogin()">登 录</button>
    <div class="info">默认账户请联系管理员获取</div>
  </div>
</div>
<!-- 汉堡菜单按钮 -->
<button class="ham" id="hamBtn" onclick="toggleSB()">☰</button>
<!-- 侧边栏遮罩 -->
<div class="sb-ov" id="sbOv" onclick="toggleSB()"></div>
  <div class="sb">
    <div class="user-bar">
      <div class="uinfo"><span id="userName" style="color:#e2e8f0;font-weight:600"></span><span id="userRole" class="urole"></span></div>
      <button class="logout-btn" onclick="doLogout()">退出</button>
    </div>
    <div class="sb-h"><h2>比赛列表</h2><button class="btn btn-a admin-only-btn" onclick="showAdd()">+新增</button></div>
    <div class="ml" id="ml"></div>
    <div style="padding:8px 16px;border-top:1px solid #334155;display:flex;align-items:center;gap:6px;font-size:12px;color:#94a3b8">
      <div id="syncDot" style="width:8px;height:8px;border-radius:50%;background:#64748b;flex-shrink:0"></div>
      <span id="syncText">连接中...</span>
    </div>
    <div style="padding:10px;border-top:1px solid #334155">
      <button class="btn btn-a" style="width:100%;margin-bottom:6px" onclick="manualSync()">手动同步</button>
      <button class="btn btn-a admin-only-btn" style="width:100%;margin-bottom:6px" onclick="exp()">导出</button>
      <button class="btn btn-a admin-only-btn" style="width:100%;margin-bottom:6px" onclick="showOCR()">📷 赔率OCR</button>
      <button class="btn btn-a admin-only-btn" style="width:100%" onclick="imp()">导入</button>
    </div>
  </div>
  <div class="main">
    <div class="tabs" id="tabs">
      <div class="tab act tab-admin" dt="setup">比赛设置</div>
      <div class="tab tab-admin" dt="bets">录入注单</div>
      <div class="tab tab-admin" dt="odds">赔率管理</div>
      <div class="tab tab-admin" dt="result">比赛结果</div>
      <div class="tab" dt="analysis">盈亏分析</div>
      <div class="tab tab-admin" dt="live">实时追踪</div>
      <div class="tab tab-admin" dt="settle">结算</div>
      <div class="tab" dt="sim">赛前模拟</div>
      <div class="tab" dt="history">历史记录</div>
      <div class="tab" dt="user">用户分析</div>
    </div>
    <div class="content" id="mc"></div>
  </div>
</div>

<div class="modal-o" id="addM" style="display:none">
  <div class="modal">
    <h3 style="color:#38bdf8;margin-bottom:14px">新增比赛</h3>
    <div style="margin-bottom:12px">
      <label style="font-size:13px;color:#94a3b8">主队</label>
      <input id="nH" style="margin-top:4px;width:100%">
    </div>
    <div style="margin-bottom:12px">
      <label style="font-size:13px;color:#94a3b8">客队</label>
      <input id="nA" style="margin-top:4px;width:100%">
    </div>
    <div style="margin-bottom:12px">
      <label style="font-size:13px;color:#94a3b8">比赛时间</label>
      <input id="nT" type="datetime-local" style="margin-top:4px;width:100%">
    </div>
    <div style="margin-bottom:12px">
      <label style="font-size:13px;color:#94a3b8">启用玩法</label>
      <div id="nPT" style="margin-top:6px;display:flex;flex-wrap:wrap;gap:6px"></div>
    </div>
    <div style="display:flex;gap:8px">
      <button class="btn btn-a" onclick="doAdd()">确认</button>
      <button class="btn" style="background:#ef4444;color:#fff" onclick="hideAdd()">取消</button>
    </div>
  </div>
</div>

<!-- OCR 赔率识别弹窗 -->
<div class="modal-o" id="ocrM" style="display:none">
  <div class="modal" style="max-width:600px">
    <h3 style="color:#38bdf8;margin-bottom:4px">📷 赔率 OCR 识别</h3>
    <p id="ocrMatchLabel" style="font-size:12px;color:#94a3b8;margin-bottom:14px">请先在比赛列表中选择一场比赛</p>
    <!-- 上传区 -->
    <div id="ocrUpload" style="border:2px dashed #475569;border-radius:12px;padding:30px;text-align:center;cursor:pointer;margin-bottom:12px;transition:border-color .2s"
         onclick="document.getElementById('ocrFile').click()"
         ondragover="this.style.borderColor='#38bdf8';event.preventDefault()"
         ondragleave="this.style.borderColor='#475569'"
         ondrop="handleOCRDrop(event)">
      <p style="font-size:40px;margin:0 0 8px">📸</p>
      <p style="color:#94a3b8;font-size:13px;margin:0">点击选择赔率截图 或 拖拽到此处</p>
      <input type="file" id="ocrFile" accept="image/*" style="display:none" onchange="handleOCRFile(event)">
    </div>
    <!-- 预览 -->
    <div id="ocrPreview" style="display:none;margin-bottom:12px;position:relative">
      <img id="ocrImg" style="width:100%;border-radius:8px;max-height:300px;object-fit:contain">
      <button onclick="resetOCR()" style="position:absolute;top:6px;right:6px;background:rgba(0,0,0,.7);color:#fff;border:none;border-radius:50%;width:28px;height:28px;font-size:16px;cursor:pointer;line-height:26px">✕</button>
    </div>
    <!-- 进度 -->
    <div id="ocrProgress" style="display:none;margin-bottom:12px">
      <div style="background:#334155;border-radius:8px;height:6px;overflow:hidden">
        <div id="ocrBar" style="height:100%;background:linear-gradient(90deg,#38bdf8,#818cf8);width:0%;transition:width .3s"></div>
      </div>
      <p id="ocrStatus" style="color:#94a3b8;font-size:12px;margin:6px 0 0;text-align:center">准备识别...</p>
    </div>
    <!-- 识别结果区：全部赔率 -->
    <div id="ocrResult" style="display:none">
      <!-- 赔率总览 -->
      <div id="ocrOddsOverview" style="margin-bottom:12px"></div>
      <!-- 下注方案 -->
      <div style="background:#1e293b;border-radius:8px;padding:14px;margin-bottom:12px">
        <h4 style="color:#fbbf24;margin:0 0 10px;font-size:14px">⚙️ 智能下注方案</h4>
        <p style="font-size:12px;color:#94a3b8;margin:0 0 8px">低赔率→多注高额 | 高赔率→少注低额</p>
        <div style="display:flex;gap:6px;align-items:center;margin-bottom:8px">
          <label style="font-size:12px;color:#94a3b8;white-space:nowrap">总注单数</label>
          <input id="ocrBetCount" type="number" value="30" min="5" max="100" style="width:80px">
          <label style="font-size:12px;color:#94a3b8;white-space:nowrap;margin-left:8px">单注范围</label>
          <input id="ocrBetMin" type="number" value="500" min="50" step="50" style="width:80px">
          <span style="color:#64748b;font-size:12px">~</span>
          <input id="ocrBetMax" type="number" value="10000" min="100" step="50" style="width:80px">
        </div>
        <div style="display:flex;gap:6px;align-items:center;margin-bottom:8px">
          <label style="font-size:12px;color:#94a3b8;white-space:nowrap">每客户下注</label>
          <input id="ocrPerMin" type="number" value="2" min="1" max="20" style="width:60px">
          <span style="color:#64748b;font-size:12px">~</span>
          <input id="ocrPerMax" type="number" value="8" min="1" max="30" style="width:60px">
          <span style="color:#64748b;font-size:12px">注</span>
          <span style="font-size:11px;color:#fbbf24;margin-left:4px">波胆≤2000/100倍数</span>
        </div>
        <div id="ocrBetPreview" style="font-size:12px;color:#94a3b8;margin-bottom:10px"></div>
      </div>
    </div>
    <!-- 操作按钮 -->
    <div id="ocrBtns" style="display:none">
      <button class="btn btn-a" style="width:100%;margin-bottom:6px" onclick="doOCRSave()">✅ 智能生成注单</button>
      <button class="btn" style="width:100%;background:#ef4444;color:#fff" onclick="hideOCR()">取消</button>
    </div>
    <div id="ocrStartBtn">
      <button class="btn btn-a" style="width:100%" onclick="startOCR()" id="ocrRunBtn" disabled>🔍 开始识别</button>
      <button class="btn" style="width:100%;margin-top:6px" onclick="hideOCR()">取消</button>
    </div>
  </div>
</div>

<!-- 赔率管理 OCR 弹窗 -->
<div class="modal-o" id="oddsOcrM" style="display:none">
  <div class="modal" style="max-width:800px">
    <h3 style="color:#38bdf8;margin-bottom:10px">📸 OCR识别赔率</h3>
    <p style="color:#94a3b8;font-size:12px;margin-bottom:10px">上传赔率截图，系统自动识别并提取赔率数据</p>
    <div id="oddsOcrDrop" style="border:2px dashed #334155;border-radius:12px;padding:30px;text-align:center;cursor:pointer;margin-bottom:10px;transition:border-color 0.2s"
         onclick="document.getElementById('oddsOcrInput').click()"
         ondragover="event.preventDefault();event.currentTarget.style.borderColor='#8b5cf6'"
         ondragleave="event.currentTarget.style.borderColor='#334155'"
         ondrop="handleOddsOCRDrop(event)">
      <input type="file" id="oddsOcrInput" accept="image/*" onchange="handleOddsOCRSelect(event)" style="display:none">
      <p style="color:#94a3b8;margin:0">拖拽或点击上传赔率截图</p>
    </div>
    <div id="oddsOcrProgress" style="display:none;margin-bottom:10px">
      <div style="background:#1e293b;border-radius:6px;height:6px;overflow:hidden"><div id="oddsOcrBar" style="height:100%;width:0%;background:linear-gradient(90deg,#8b5cf6,#38bdf8);transition:width 0.3s"></div></div>
      <p id="oddsOcrStatus" style="font-size:11px;color:#94a3b8;margin-top:4px"></p>
    </div>
    <div id="oddsOcrResult" style="display:none;max-height:500px;overflow-y:auto;margin-bottom:10px"></div>
    <div style="display:flex;gap:6px">
      <button id="oddsOcrRunBtn" class="btn btn-a" style="flex:1" onclick="startOddsOCR()" disabled>🔍 开始识别</button>
      <button class="btn" style="background:#ef4444;color:#fff;flex:1" onclick="hideOddsOCR()">取消</button>
      <button id="oddsOcrSaveBtn" class="btn btn-a" style="flex:1;display:none" onclick="saveOddsOCR()">✅ 导入到赔率表</button>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js"></script>
<script>

// ===== 登录系统 =====
let _auth = null; // { token, username, role, label }

function getAuthToken() { return _auth ? _auth.token : null; }

function setRoleBody() {
  if (_auth) {
    document.body.className = 'role-' + _auth.role;
    document.getElementById('userName').textContent = _auth.username;
    const roleEl = document.getElementById('userRole');
    roleEl.textContent = _auth.label;
    roleEl.className = 'urole urole-' + _auth.role;
  }
}

async function doLogin() {
  const username = document.getElementById('loginUser').value.trim();
  const password = document.getElementById('loginPass').value;
  const errEl = document.getElementById('loginErr');
  errEl.textContent = '';

  if (!username || !password) {
    errEl.textContent = '请输入用户名和密码';
    return;
  }

  try {
    const resp = await fetch(API_BASE + '/api/login', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ username, password })
    });
    const data = await resp.json();
    if (!resp.ok) {
      errEl.textContent = data.error || '登录失败';
      return;
    }

    _auth = { token: data.token, username: data.username, role: data.role, label: data.label };
    // 持久化令牌（24小时有效）
    try { localStorage.setItem('fpnl3_auth', JSON.stringify(_auth)); } catch(e) {}

    // 隐藏登录页，显示主界面
    document.getElementById('loginWrap').style.display = 'none';
    setRoleBody();
    // 初始化主应用
    init();
  } catch(e) {
    errEl.textContent = '网络错误，请检查连接';
  }
}

function doLogout() {
  _auth = null;
  try { localStorage.removeItem('fpnl3_auth'); } catch(e) {}
  document.getElementById('loginWrap').style.display = 'flex';
  document.getElementById('loginUser').value = '';
  document.getElementById('loginPass').value = '';
  document.getElementById('loginErr').textContent = '';
  document.body.className = '';
}

async function verifyStoredAuth() {
  try {
    const stored = JSON.parse(localStorage.getItem('fpnl3_auth') || 'null');
    if (!stored || !stored.token) return false;

    // 验证令牌是否仍然有效
    const resp = await fetch(API_BASE + '/api/verify', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ token: stored.token })
    });
    if (!resp.ok) {
      localStorage.removeItem('fpnl3_auth');
      return false;
    }

    _auth = stored;
    setRoleBody();
    return true;
  } catch(e) {
    return false; // 离线模式：使用本地存储的令牌
  }
}

// ===== 截图识别 OCR =====
let _ocrImageData = null;
let _ocrParsedOdds = null;

function showOCR() {
  const m = getCur();
  if (m) {
    document.getElementById('ocrMatchLabel').textContent = '当前比赛: ' + m.h + ' vs ' + m.a;
    document.getElementById('ocrMatchLabel').style.color = '#38bdf8';
  } else {
    document.getElementById('ocrMatchLabel').textContent = '请先在左侧比赛列表中选择一场比赛';
    document.getElementById('ocrMatchLabel').style.color = '#fbbf24';
  }
  document.getElementById('ocrM').style.display = 'flex';
  resetOCR();
}

function handleOCRDrop(e) {

  e.target.style.borderColor = '#475569';

  if (!file) return;
  const reader = new FileReader();
  reader.onload = function(ev) {

    showOCRPreview();
  };

async function startOCR() {
  if (!_ocrImageData) return;
  const bar = document.getElementById('ocrBar');
  const status = document.getElementById('ocrStatus');
  document.getElementById('ocrProgress').style.display = '';
  document.getElementById('ocrStartBtn').style.display = 'none';
  bar.style.width = '2%'; bar.style.background = 'linear-gradient(90deg,#38bdf8,#818cf8)';
  status.textContent = '正在初始化识别引擎...';

  try {
    bar.style.width = '5%';
    status.textContent = '正在加载语言数据（首次需下载约4MB）...';

    const { data: { text } } = await Tesseract.recognize(_ocrImageData, 'eng', {
      logger: m => {
        if (m.status === 'loading language traineddata') {
          bar.style.width = Math.round(15 + m.progress * 25) + '%';
          status.textContent = '下载语言数据 ' + Math.round(m.progress * 100) + '%...';
        } else if (m.status === 'recognizing text') {
          bar.style.width = Math.round(40 + m.progress * 55) + '%';
          status.textContent = '识别文字 ' + Math.round(m.progress * 100) + '%...';
        } else if (m.status === 'initializing api') {
          bar.style.width = '40%'; status.textContent = '初始化...';
        } else if (m.status === 'loading tesseract core') {
          bar.style.width = '10%'; status.textContent = '加载引擎...';
        }
      }
    });

    bar.style.width = '100%'; status.textContent = '识别完成！';
    console.log('OCR 原始文本:\n' + text);

    _ocrParsedOdds = parseAllOdds(text);
    console.log('解析全部赔率:', JSON.stringify(_ocrParsedOdds, null, 2));

    renderOddsOverview(_ocrParsedOdds);
    updateBetPreview();

    document.getElementById('ocrProgress').style.display = 'none';
    document.getElementById('ocrResult').style.display = '';
    document.getElementById('ocrBtns').style.display = '';

  } catch(e) {
    console.error('OCR error:', e);
    status.textContent = '❌ ' + (e.message || '识别失败');
    bar.style.background = '#ef4444';
    document.getElementById('ocrStartBtn').style.display = '';
    document.getElementById('ocrRunBtn').disabled = false;
  }
}

// ===== 解析全部赔率 =====
function parseAllOdds(text) {
  // 预处理：统一分隔符
  const raw = text.replace(/\t/g, '  ').replace(/\r/g, '\n');
  const result = { '1x2': [], ah: [], ou: [], cs: [] };
  console.log('=== OCR原始文本 ===\n' + raw + '\n=== END ===');

  // ==== 阶段0: 全局匹配所有比分-赔率对（支持同一行多个对）====
  // 波胆赔率通常 > 2.0，用这个阈值区分让球/大小球（水位通常 ≤ 2.0）
  const csGlobalRe = /(\d+[-:]\d+)\s+(\d+(?:\.\d{1,2})?)/g;
  let gMatch;
  while ((gMatch = csGlobalRe.exec(raw)) !== null) {
    const score = gMatch[1].replace(/\s+/g, '');
    const ov = parseFloat(gMatch[2]);
    if (ov > 2.0 && ov < 999) {
      result.cs.push({ score, odds: ov });
    }
  }

  // "其他"（波胆）
  const otherMatch = raw.match(/其他\s*(?:一切)?\s*(\d+(?:\.\d{1,2})?)/g);
  if (otherMatch) {
    otherMatch.forEach(m => {
      const om = m.match(/(\d+(?:\.\d{1,2})?)/);
      if (om && parseFloat(om[1]) > 2) result.cs.push({ score: '其他', odds: parseFloat(om[1]) });
    });
  }

  // ==== 阶段1: 合并拆行的比分-赔率（矩阵布局）====
  let lines = raw.split('\n').map(l => l.trim()).filter(Boolean);
  const scoreRe = /^\s*(\d+)\s*[-:]\s*(\d+)\s*$/;
  const oddsOnlyRe = /^\s*(\d+(?:\.\d{1,2})?)\s*$/;
  const merged = [];
  for (let i = 0; i < lines.length; i++) {
    const sc = lines[i].match(scoreRe);
    if (sc && i + 1 < lines.length) {
      const nextOdds = lines[i + 1].match(oddsOnlyRe);
      if (nextOdds) {
        const ov = parseFloat(nextOdds[1]);
        if (ov > 2.0 && ov < 999) {
          merged.push(sc[1] + '-' + sc[2] + ' ' + nextOdds[1]);
          i++; continue;
        }
      }
    }
    merged.push(lines[i]);
  }
  lines = merged;

  // ==== 阶段2: 逐行解析 AH/OU/1X2 ====
  const ODDS = '(\\d+(?:\\.\\d{1,2})?)';
  const LINE_NO = '([-+]?\\d+(?:\\.\\d)?)';

  for (const line of lines) {
    if (/^[A-Za-z\s]{4,}$/.test(line) && !/\d/.test(line)) continue;
    if (/^(时间|日期|比赛|联赛|Time|Date|Match)/i.test(line)) continue;

    // 行内波胆（阶段0的补充：捕获赔率 ≤ 2.0 的波胆，比如罕见的低赔率比分）
    const csInline = line.match(/(\d+\s*[-:]\s*\d+)\s+(\d+(?:\.\d{1,2})?)/);
    if (csInline) {
      const score = csInline[1].replace(/\s+/g, '');
      const ov = parseFloat(csInline[2]);
      // 只补充阶段0漏掉的（阶段0已用 > 2.0 过滤）
      if (ov > 2.0 && ov < 999) {
        // 已在阶段0中处理，跳过
      } else if (ov > 1.0 && ov < 2.0 && !/(?:[OoUu大小]|[-+]\d)/i.test(line)) {
        // 低赔率波胆，且不是AH/OU格式
        result.cs.push({ score, odds: ov });
      }
    }

    // ---- 尝试匹配盘口+2个水位 ----
    const ahRaw = line.match(new RegExp(LINE_NO + '\\s+' + ODDS + '\\s+' + ODDS));
    if (ahRaw) {
      const lv = parseFloat(ahRaw[1]);
      const ho = parseFloat(ahRaw[2]);
      const ao = parseFloat(ahRaw[3]);
      if (Math.abs(lv) <= 10 && ho > 0.3 && ho < 3.0 && ao > 0.3 && ao < 3.0) {
        // 判断大小球 vs 让球
        if (/[OoUu大小]/i.test(line)) {
          result.ou.push({ line: lv, over: ho, under: ao });
        } else {
          result.ah.push({ line: lv, home: ho, away: ao });
        }
        continue;
      }
    }

    // ---- 尝试匹配3个赔率(独赢) ----
    const trioRaw = line.match(new RegExp(ODDS + '\\s+' + ODDS + '\\s+' + ODDS));
    if (trioRaw) {
      const v1 = parseFloat(trioRaw[1]), v2 = parseFloat(trioRaw[2]), v3 = parseFloat(trioRaw[3]);
      // 独赢：3个数都在 1.0~50 之间
      if (v1 > 1.0 && v1 < 50 && v2 > 1.0 && v2 < 50 && v3 > 1.0 && v3 < 50) {
        result['1x2'].push({ home: v1, draw: v2, away: v3 });
        continue;
      }
    }

    // ---- 尝试2个赔率(标准水位) ----
    const pairRaw = line.match(new RegExp(ODDS + '\\s+' + ODDS));
    if (pairRaw && !ahRaw && !trioRaw) {
      const p1 = parseFloat(pairRaw[1]), p2 = parseFloat(pairRaw[2]);
      if (p1 > 0.3 && p1 < 3.0 && p2 > 0.3 && p2 < 3.0) {
        // 前面可能有一个盘口被 OCR 漏掉了，尝试在行首找
        const pre = line.match(new RegExp(LINE_NO + '\\s*'));
        const lv = pre ? parseFloat(pre[1]) : null;
        if (lv !== null && Math.abs(lv) <= 10) {
          if (/[OoUu大小]/i.test(line)) result.ou.push({ line: lv, over: p1, under: p2 });
          else result.ah.push({ line: lv, home: p1, away: p2 });
        }
      }
    }
  }

  // 去重
  result['1x2'] = dedup1X2(result['1x2']);
  result.ah = dedupAH(result.ah);
  result.ou = dedupOU(result.ou);
  result.cs = dedupCs(result.cs);
  return result;
}
function dedup(arr) { const s=new Set(); return arr.filter(x=>{const k=JSON.stringify(x);if(s.has(k))return false;s.add(k);return true;}); }
function dedup1X2(arr) { const s=new Set(); return arr.filter(x=>{const k=x.home.toFixed(2)+'|'+x.draw.toFixed(2)+'|'+x.away.toFixed(2);if(s.has(k))return false;s.add(k);return true;}); }
function dedupAH(arr) { const s=new Set(); return arr.filter(x=>{const k=String(x.line)+'|'+x.home.toFixed(2)+'|'+x.away.toFixed(2);if(s.has(k))return false;s.add(k);return true;}); }
function dedupOU(arr) { const s=new Set(); return arr.filter(x=>{const k=String(x.line)+'|'+x.over.toFixed(2)+'|'+x.under.toFixed(2);if(s.has(k))return false;s.add(k);return true;}); }
function dedupCs(arr) { const s=new Set(); return arr.filter(x=>{if(s.has(x.score))return false;s.add(x.score);return true;}); }
function escHtml(s) { return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

// ===== 下注预览 =====
function updateBetPreview() {
  const el = document.getElementById('ocrBetPreview');
  if (!_ocrParsedOdds) { el.innerHTML = ''; return; }
  const all = getOddsOptions(_ocrParsedOdds);
  if (!all.length) { el.innerHTML = '无可用赔率'; return; }
  const n = parseInt(document.getElementById('ocrBetCount').value) || 30;
  const perMin = parseInt(document.getElementById('ocrPerMin').value) || 2;
  const perMax = parseInt(document.getElementById('ocrPerMax').value) || 8;
  const totalW = assignWeights(all);
  const cnt = {};
  all.forEach(o => { o.est = Math.max(1, Math.round(n * o.weight / totalW)); const k = ptLabel(o.pt); cnt[k] = (cnt[k] || 0) + o.est; });
  const parts = Object.entries(cnt).map(([k,v])=>k+' '+v+'注').join(' | ');
  const total = Object.values(cnt).reduce((a,b)=>a+b,0);
  const avgPer = Math.floor((perMin + perMax) / 2);
  const estClients = Math.max(1, Math.ceil(n / avgPer));
  el.innerHTML = '预计 ' + total + ' 注 / ' + estClients + ' 个客户 | ' + parts + '<br><span style="color:#fbbf24">波胆金额≤2000，100倍数</span>';
}

// ===== 智能生成注单 =====
async function doOCRSave() {
  const m = getCur(); if (!m) return alert('请先选择比赛！');
  if (!_ocrParsedOdds) return alert('请先识别赔率');

  const n = parseInt(document.getElementById('ocrBetCount').value) || 30;
  const minA = parseInt(document.getElementById('ocrBetMin').value) || 500;
  const maxA = parseInt(document.getElementById('ocrBetMax').value) || 10000;
  const perMin = parseInt(document.getElementById('ocrPerMin').value) || 2;
  const perMax = parseInt(document.getElementById('ocrPerMax').value) || 8;

  const all = getOddsOptions(_ocrParsedOdds);
  if (!all.length) return alert('未识别到赔率');
  const totalW = assignWeights(all);

  // 确保玩法启用
  for (const pt of new Set(all.map(o=>o.pt))) { if (!m.pts.includes(pt)) m.pts.push(pt); }

  // 40个客户名（男性为主，中英文混合）
  const CLIENTS = [
    '张浩','王磊','李强','刘军','陈刚','杨勇','赵峰','黄伟','周鹏','吴杰',
    '徐明','孙鑫','马腾','朱俊','胡涛','郭靖','林峰','何军','罗刚','梁超',
    '宋磊','郑辉','谢宇','韩龙','唐飞','冯刚','董伟','萧然','曹磊','袁涛',
    'David','Tom','Jack','Mike','Alex','王芳','李娜','陈静','赵敏','刘洋'
  ];

  // 计算需要多少客户
  const avgPer = Math.floor((perMin + perMax) / 2);
  let numClients = Math.ceil(n / avgPer);
  numClients = Math.min(numClients, CLIENTS.length);
  numClients = Math.max(numClients, 1);

  // 随机选取客户
  const pool = [...CLIENTS].sort(() => Math.random() - 0.5);
  const selected = pool.slice(0, numClients);

  // 分配每人注数（每人 perMin~perMax 注，总和尽量接近 n）
  const betsPerClient = {};
  let remaining = n;
  for (let i = 0; i < selected.length; i++) {
    const left = selected.length - i;
    if (left === 1) {
      betsPerClient[selected[i]] = Math.max(perMin, Math.min(perMax, remaining));
    } else {
      const lo = Math.max(perMin, remaining - (left - 1) * perMax);
      const hi = Math.min(perMax, remaining - (left - 1) * perMin);
      betsPerClient[selected[i]] = lo + Math.floor(Math.random() * (hi - lo + 1));
    }
    remaining -= betsPerClient[selected[i]];
  }

  // 生成注单 — 每个客户每注都不同，客户之间也不重复
  // 构建赔率池：多轮洗牌确保足够多样化
  let betPool = [];
  while (betPool.length < n) {
    const round = [...all].sort(() => Math.random() - 0.5);
    betPool = betPool.concat(round);
  }

  const used = new Set(); const gen = []; let betIdx = 0;
  let poolIdx = 0; // 赔率池消耗位置

  for (const client of selected) {
    used.add(client);
    const clientGot = new Set(); // 该客户已分配的注单类型

    for (let j = 0; j < betsPerClient[client]; j++) {
      // 从池中取一个该客户还没有的类型
      let chosen = null;
      for (let attempt = 0; attempt < betPool.length && !chosen; attempt++) {
        const cand = betPool[(poolIdx + attempt) % betPool.length];
        const key = cand.pt + '|' + cand.opt + (cand.hc !== undefined ? '|' + cand.hc : '');
        if (!clientGot.has(key)) {
          chosen = cand;
          clientGot.add(key);
          poolIdx = (poolIdx + attempt + 1) % betPool.length;
        }
      }
      // 如果池中找不到该客户没选过的，从原始选项中补
      if (!chosen) {
        const fresh = all.filter(o => {
          const k = o.pt + '|' + o.opt + (o.hc !== undefined ? '|' + o.hc : '');
          return !clientGot.has(k);
        });
        chosen = fresh.length ? fresh[Math.floor(Math.random() * fresh.length)] : all[Math.floor(Math.random() * all.length)];
        clientGot.add(chosen.pt + '|' + chosen.opt + (chosen.hc !== undefined ? '|' + chosen.hc : ''));
      }

      // 金额：波胆特殊处理
      const rf = Math.min(1, 1 / Math.max(0.3, chosen.odds - 0.5));
      let amt;
      if (chosen.pt === 'cs') {
        const csMax = Math.min(2000, maxA);
        amt = minA + Math.floor((csMax - minA) * rf * (0.5 + Math.random() * 0.5));
        amt = Math.round(amt / 100) * 100;
        amt = Math.max(minA, Math.min(csMax, amt));
      } else {
        amt = minA + Math.floor((maxA - minA) * rf * (0.5 + Math.random() * 0.5));
        amt = Math.round(amt / 50) * 50;
        amt = Math.max(minA, Math.min(maxA, amt));
      }

      const bet = {
        id: 'b' + Date.now() + '_' + betIdx,
        client, pt: chosen.pt, opt: chosen.opt, amt,
        odds: Math.round(chosen.odds * 100) / 100,
        settled: false
      };
      if (chosen.hc !== undefined) bet.hc = String(chosen.hc);
      gen.push(bet);
      betIdx++;
    }
  }

  m.bets.push(...gen); used.forEach(c => S.cl.add(c)); save();
  hideOCR(); renderList(); switchMatch(m.id);

  const stat = {};
  gen.forEach(b => { const k = ptLabel(b.pt); stat[k] = (stat[k] || 0) + 1; });
  alert('✅ 已生成 ' + gen.length + ' 笔下注\n👤 ' + used.size + ' 个客户（每客户' + perMin + '-' + perMax + '注）\n📊 ' + Object.entries(stat).map(([k, v]) => k + v + '注').join(' | '));
}

// 辅助函数
function getOddsOptions(odds) {
  const r = [];
  odds['1x2'].forEach(o=>{r.push({pt:'1x2',opt:'主胜',odds:o.home});r.push({pt:'1x2',opt:'平局',odds:o.draw});r.push({pt:'1x2',opt:'客胜',odds:o.away});});
  odds.ah.forEach(o=>{r.push({pt:'ah',opt:'主队',odds:o.home,hc:o.line});r.push({pt:'ah',opt:'客队',odds:o.away,hc:o.line});});
  odds.ou.forEach(o=>{r.push({pt:'ou',opt:'大球',odds:o.over,hc:o.line});r.push({pt:'ou',opt:'小球',odds:o.under,hc:o.line});});
  odds.cs.forEach(o=>r.push({pt:'cs',opt:o.score,odds:o.odds}));
  return r;
}
function assignWeights(arr) {
  arr.forEach(o=>{o.weight=o.odds<=1.5?8:o.odds<=2?6:o.odds<=3?4:o.odds<=5?2:o.odds<=10?1:0.5;});
  return arr.reduce((s,o)=>s+o.weight,0);
}
function ptLabel(pt) { return pt==='cs'?'波胆':pt==='1x2'?'独赢':pt==='ah'?'让球':'大小球'; }

});

// ===== 余额充值 =====
function doRecharge(client) {
  const amt = parseFloat(document.getElementById('blAmt')?.value);
  if (isNaN(amt) || amt <= 0) return alert('请输入有效充值金额');
  const note = document.getElementById('blNote')?.value.trim() || '';
  if (!S.bl[client]) S.bl[client] = { credit: 0, txns: [] };
  S.bl[client].credit += amt;
  S.bl[client].txns.push({ amt, note, at: new Date().toISOString() });
  save();
  renderUserDetail();
  alert('充值成功：+' + amt + (note ? '（'+note+'）' : ''));
}

// ===== 辅助 =====
function isFullTimeSet(res) {
  return res && res.hg != null && res.ag != null;
}
function isHalfTimeSet(res) {
  return res && res.htH != null && res.htA != null;
}
function getNum(id) {
  const v = document.getElementById(id).value;
  if (v === '') return null;
  const n = parseInt(v);
  return isNaN(n) ? null : n;
}

// ===== 比赛列表 =====
function renderList() {
  const el = document.getElementById('ml');
  if (!S.ms.length) {
    el.innerHTML = '<p style="color:#94a3b8;padding:20px;text-align:center;font-size:12px">暂无比赛</p>';
    return;
  }
  el.innerHTML = S.ms.map(m => {
    const act = m.id === S.cid ? ' act' : '';
    let resStr = '未结束';
    if (m.res) {
      if (isHalfTimeSet(m.res) && !isFullTimeSet(m.res)) {
        resStr = '上半场 ' + m.res.htH + '-' + m.res.htA;
      } else if (isFullTimeSet(m.res)) {
        resStr = m.res.hg + '-' + m.res.ag;
      }
    }
    return '<div class="mi'+act+'" onclick="switchMatch(\''+m.id+'\')">' +
      '<button class="del admin-only-btn" onclick="event.stopPropagation();delMatch(\''+m.id+'\')">✕</button>' +
      '<div class="t">'+m.h+' vs '+m.a+'</div>' +
      '<div class="i">'+(m.time?m.time.replace('T',' '):'时间未设')+' | '+resStr+'</div>' +
      '<div class="c">注单：'+m.bets.length+'笔</div>' +
      '</div>';
  }).join('');
}

function switchMatch(id) {
  S.cid = id;
  // 保存 UI 状态
  try {
    const ui = JSON.parse(localStorage.getItem('fpnl3_ui')||'{}');
    ui.cid = id;
    localStorage.setItem('fpnl3_ui', JSON.stringify(ui));
  } catch(e) {}
  renderList();
  // 手机端自动关闭侧边栏
  if (window.innerWidth <= 768) toggleSB();
  const t = document.querySelector('#tabs .tab.act');
  switchTab(t ? t.getAttribute('dt') : 'setup');
}

function delMatch(id) {
  if (_auth && _auth.role !== 'admin') return alert('当前账户为只读模式，无法删除');
  if (!confirm('删除本场比赛及所有注单？')) return;
  S.ms = S.ms.filter(m => m.id !== id);
  if (S.cid === id) S.cid = S.ms.length ? S.ms[0].id : null;
  // 保存 UI 状态
  try {
    const ui = JSON.parse(localStorage.getItem('fpnl3_ui')||'{}');
    ui.cid = S.cid;
    localStorage.setItem('fpnl3_ui', JSON.stringify(ui));
  } catch(e) {}
  save(); renderList();
  if (S.cid) switchTab('setup');
  else document.getElementById('mc').innerHTML = '<p style="color:#94a3b8;padding:40px;text-align:center">请添加比赛</p>';
}

document.getElementById('tabs').addEventListener('click', e => {
  const t = e.target.closest('.tab');
  if (t) switchTab(t.getAttribute('dt'));
});

function switchTab(dt) {
  // 财务账户不能进入管理类标签
  const adminTabs = ['setup','bets','odds','result','live','settle'];
  if (_auth && _auth.role !== 'admin' && adminTabs.includes(dt)) {
    dt = 'analysis';
  }
  document.querySelectorAll('#tabs .tab').forEach(t => t.classList.remove('act'));
  const ta = document.querySelector('#tabs .tab[dt="'+dt+'"]');
  if (ta) ta.classList.add('act');
  // 保存当前标签到 UI 状态
  try {
    const ui = JSON.parse(localStorage.getItem('fpnl3_ui')||'{}');
    ui.tab = dt;
    localStorage.setItem('fpnl3_ui', JSON.stringify(ui));
  } catch(e) {}
  const m = getCur();
  if (!m && !['history','user'].includes(dt)) {
    document.getElementById('mc').innerHTML = '<p style="color:#94a3b8;padding:40px;text-align:center">请先添加或选择比赛</p>';
    return;
  }
  renderPanel(dt, m);
}

// ===== 渲染面板 =====
function renderPanel(tab, m) {
  const c = document.getElementById('mc');
  // 财务账户不允许渲染管理类面板（双重保险）
  const adminTabs = ['setup','bets','odds','result','live','settle'];
  if (_auth && _auth.role !== 'admin' && adminTabs.includes(tab)) {
    c.innerHTML = '<div style="padding:40px;text-align:center;color:#94a3b8"><p style="font-size:48px;margin-bottom:12px">🔒</p><p>当前账户为只读模式，无法访问此功能</p></div>';
    return;
  }
  switch(tab) {
    case 'setup':    c.innerHTML = renderSetup(m); break;
    case 'bets':     c.innerHTML = renderBets(m); setTimeout(()=>onPTChange(), 50); break;
    case 'odds':     c.innerHTML = renderOdds(m); break;
    case 'result':   c.innerHTML = renderResult(m); break;
    case 'analysis': c.innerHTML = renderAnalysis(m); break;
    case 'sim':      c.innerHTML = renderSim(m); break;
    case 'settle':  c.innerHTML = renderSettle(); break;
    case 'history':  c.innerHTML = renderHistory(); break;
    case 'user':     c.innerHTML = renderUser(); break;
  }
}

      h += '<input value="'+o.odds+'" onchange="updateOddsCell(\''+key+'\','+data.indexOf(o)+',\'odds\',this.value)" style="width:55px;background:transparent;border:1px solid #334155;color:'+cl+';padding:2px 4px;border-radius:3px;font-size:11px;text-align:center;font-weight:700">';
      h += '<button style="background:none;border:none;color:#ef4444;cursor:pointer;font-size:14px;padding:0 2px" onclick="delOddsRow(\''+key+'\','+data.indexOf(o)+')">×</button>';
      h += '</div>';
    });
    h += '</div>';
  } else {
    h += '<p style="color:#64748b;font-size:12px;margin:0">暂无数据，点击"添加"手动输入或使用OCR导入</p>';
  }
  h += '</div>';
  return h;
}

function addOddsRow(key) {
  const m = getCur(); if (!m) return;
  if (!m.odds) m.odds = { '1x2':[], ah:[], ou:[], cs:[], ht1x2:[], htah:[], htau:[], htcs:[] };
  const arr = m.odds[key]; if (!arr) return;
  switch(key) {
    case '1x2': case 'ht1x2': arr.push({ home: '1.80', draw: '3.50', away: '4.00' }); break;
    case 'ah': case 'htah': arr.push({ line: '-0.5', home: '0.90', away: '0.95' }); break;
    case 'ou': case 'htau': arr.push({ line: '2.5', over: '0.90', under: '0.95' }); break;
    case 'cs': case 'htcs': arr.push({ score: '1-0', odds: '7.00' }); break;
  }
  renderPanel('odds', m);
}

function delOddsRow(key, idx) {
  const m = getCur(); if (!m || !m.odds || !m.odds[key]) return;
  m.odds[key].splice(idx, 1);
  renderPanel('odds', m);
}

function updateOddsCell(key, idx, field, val) {
  const m = getCur(); if (!m || !m.odds || !m.odds[key]) return;
  const row = m.odds[key][idx]; if (!row) return;
  const n = parseFloat(val);
  row[field] = isNaN(n) ? val : n;
}

function saveOdds(id) {
  const m = S.ms.find(x => x.id === id);
  if (!m) return;
  // 从DOM收集所有输入值已经通过onchange实时更新到m.odds
  save();
  alert('赔率已保存！');
}

async function startOddsOCR() {
  if (!_oddsOCRImageData) return;
  const bar = document.getElementById('oddsOcrBar');
  const status = document.getElementById('oddsOcrStatus');
  document.getElementById('oddsOcrProgress').style.display = '';
  bar.style.width = '2%'; bar.style.background = 'linear-gradient(90deg,#8b5cf6,#38bdf8)';
  status.textContent = '正在初始化识别引擎...';

  try {
    bar.style.width = '5%';
    status.textContent = '正在加载语言数据（首次需下载约4MB）...';

    const { data: { text } } = await Tesseract.recognize(_oddsOCRImageData, 'eng', {
      logger: m => {
        if (m.status === 'loading language traineddata') {
          bar.style.width = Math.round(15 + m.progress * 25) + '%';
          status.textContent = '下载语言数据 ' + Math.round(m.progress * 100) + '%...';
        } else if (m.status === 'recognizing text') {
          bar.style.width = Math.round(40 + m.progress * 55) + '%';
          status.textContent = '识别文字 ' + Math.round(m.progress * 100) + '%...';
        } else if (m.status === 'initializing api') {
          bar.style.width = '40%'; status.textContent = '初始化...';
        } else if (m.status === 'loading tesseract core') {
          bar.style.width = '10%'; status.textContent = '加载引擎...';
        }
      }
    });

    bar.style.width = '100%'; status.textContent = '识别完成！';
    console.log('OCR 原始文本:\n' + text);

    _oddsOCRParsedOdds = parseAllOdds(text);
    console.log('解析赔率:', JSON.stringify(_oddsOCRParsedOdds, null, 2));

    // 渲染识别结果预览
    const resultEl = document.getElementById('oddsOcrResult');
    let rh = '';
    if (_oddsOCRParsedOdds['1x2'].length) {
      rh += '<div style="background:#0f172a;border-radius:6px;padding:8px;margin-bottom:6px"><span style="color:#38bdf8;font-size:12px">🏆 独赢:</span> '+
        _oddsOCRParsedOdds['1x2'].map(o=>'<span style="color:#fbbf24">'+o.home.toFixed(2)+' / '+o.draw.toFixed(2)+' / '+o.away.toFixed(2)+'</span>').join(', ')+'</div>';
    }
    if (_oddsOCRParsedOdds.ah.length) {
      rh += '<div style="background:#0f172a;border-radius:6px;padding:8px;margin-bottom:6px"><span style="color:#38bdf8;font-size:12px">⚽ 让球:</span> '+
        _oddsOCRParsedOdds.ah.map(o=>'<span style="color:#a78bfa">'+(o.line>0?'+':'')+o.line+'</span> <span style="color:#fbbf24">'+o.home.toFixed(2)+'/'+o.away.toFixed(2)+'</span>').join(', ')+'</div>';
    }
    if (_oddsOCRParsedOdds.ou.length) {
      rh += '<div style="background:#0f172a;border-radius:6px;padding:8px;margin-bottom:6px"><span style="color:#38bdf8;font-size:12px">⚪ 大小球:</span> '+
        _oddsOCRParsedOdds.ou.map(o=>'<span style="color:#a78bfa">'+o.line+'</span> <span style="color:#fbbf24">'+o.over.toFixed(2)+'/'+o.under.toFixed(2)+'</span>').join(', ')+'</div>';
    }
    if (_oddsOCRParsedOdds.cs.length) {
      rh += '<div style="background:#0f172a;border-radius:6px;padding:8px;margin-bottom:6px"><span style="color:#38bdf8;font-size:12px">🎯 波胆 ('+_oddsOCRParsedOdds.cs.length+'项):</span> '+
        _oddsOCRParsedOdds.cs.map(o=>'<span style="color:#fbbf24">'+o.score+'('+o.odds+')</span>').join(' ')+'</div>';
    }
    if (!rh) rh = '<p style="color:#ef4444;font-size:12px">未识别到赔率数据</p>';
    // 添加原始OCR文本（调试用，可折叠）
    rh += '<details style="margin-top:10px;background:#0f172a;border-radius:6px;padding:8px"><summary style="color:#64748b;font-size:11px;cursor:pointer">🔍 原始OCR文本（调试）</summary><pre style="color:#94a3b8;font-size:10px;white-space:pre-wrap;word-break:break-all;max-height:200px;overflow-y:auto;margin:8px 0 0">'+escHtml(text)+'</pre></details>';
    resultEl.innerHTML = rh;
    document.getElementById('oddsOcrResult').style.display = '';
    document.getElementById('oddsOcrProgress').style.display = 'none';
    document.getElementById('oddsOcrSaveBtn').style.display = '';

  } catch(e) {
    console.error('OCR error:', e);
    status.textContent = '❌ ' + (e.message || '识别失败');
    bar.style.background = '#ef4444';
    const btn = document.getElementById('oddsOcrRunBtn');
    if (btn) btn.disabled = false;
  }
}

function saveOddsOCR() {
  const m = getCur(); if (!m) return;
  if (!_oddsOCRParsedOdds) return alert('请先识别赔率');
  if (!m.odds) m.odds = { '1x2':[], ah:[], ou:[], cs:[], ht1x2:[], htah:[], htau:[], htcs:[] };

  if (_oddsOCRParsedOdds['1x2'].length) m.odds['1x2'] = _oddsOCRParsedOdds['1x2'];

  for (const pt of ['1x2','ah','ou','cs']) {

// ===== 可赢金额计算 =====
function calcWinAmt(amt, odds) {
  if (isNaN(amt) || isNaN(odds) || amt <= 0 || odds < 1) return '-';
  return (amt * (odds - 1)).toFixed(0);
}

// ===== 注单排序（最新在前）=====
function sortBetsNewest(bets) {
  return [...bets].sort((a, b) => (b.createdAt || '').localeCompare(a.createdAt || ''));
}

function calcWinPreview() {
  const oddsEl = document.getElementById('oddsPreview');
  if (!oddsEl) return;
  const amt = parseFloat(document.getElementById('bAmt')?.value);
  const winAmt = parseFloat(document.getElementById('bWinAmt')?.value);
  if (!amt || amt <= 0 || isNaN(winAmt) || winAmt < 0) {
    oddsEl.textContent = '-';
    return;
  }
  const odds = (amt + winAmt) / amt;
  oddsEl.textContent = odds.toFixed(2);
}

// ===== 注单表格 =====
function renderBetTable(bets, m) {
  const hasRes = m.res && (isFullTimeSet(m.res) || isHalfTimeSet(m.res));
  let h = '<table><thead><tr><th>客户</th><th>玩法</th><th>选项</th><th>盘口</th><th>金额</th><th>赔率</th><th>可赢</th><th>结算状态</th><th>操作</th></tr></thead><tbody>';
  h += bets.map(b => {
    const pt = PC[b.pt] || {n:b.pt};
    let hc = '-';
    if (b.hc !== null) hc = b.hcSplit ? b.hcSplit.join('/') : b.hc;
    const winAmt = calcWinAmt(b.amt, b.odds);
    // 结算状态
    let settleStr = '';
    if (b.settled) {
      const rl = resLabel(b.settlement.res);
      settleStr = '<span class="tag '+(b.settlement.res==='win'?'t-w':b.settlement.res==='lose'?'t-l':'t-p')+'">'+rl+'</span>';
    } else if (!hasRes) {
      settleStr = '<span style="color:#94a3b8;font-size:11px">无赛果</span>';
    } else {
      settleStr = '<button class="btn" style="background:#38bdf8;color:#fff;font-size:11px;padding:3px 8px" onclick="doSettleBet(\''+m.id+'\',\''+b.id+'\')">结算</button>';
    }
    return '<tr><td>'+b.client+'</td><td>'+pt.n+'</td><td>'+b.opt+'</td><td>'+hc+'</td><td>'+b.amt+'</td><td>'+b.odds+'</td><td style="color:#22c55e;font-weight:600">'+winAmt+'</td>' +
      '<td>'+settleStr+'</td>' +
      '<td><button class="btn admin-only-btn" style="background:#ef4444;color:#fff;font-size:11px;padding:3px 8px" onclick="delBet(\''+m.id+'\',\''+b.id+'\')">删除</button>' +
      (b.settled ? '<button class="btn" style="background:#94a3b8;color:#fff;font-size:11px;padding:3px 8px;margin-left:4px" onclick="undoSettle(\''+m.id+'\',\''+b.id+'\')">撤销</button>' : '') +
      '</td></tr>';
  }).join('');
  h += '</tbody></table>';
  return h;
}

function delBet(mid, bid) {
  if (_auth && _auth.role !== 'admin') return alert('当前账户为只读模式，无法删除');
  const m = S.ms.find(x => x.id === mid); if (!m) return;
  m.bets = m.bets.filter(b => b.id !== bid);
  save(); renderList(); switchTab('bets');
}

function doSettleBet(mid, bid) {
  const m = S.ms.find(x => x.id === mid); if (!m) return;
  const b = m.bets.find(x => x.id === bid); if (!b) return;
  // 开球注单只需先开球结果，不需比分
  if (b.pt === 'kickoff') {
    if (!m.res || m.res.kickOff === '') return alert('请先在「比赛结果」标签页填写先开球结果');
  } else {
    if (!m.res || (!isFullTimeSet(m.res) && !isHalfTimeSet(m.res))) return alert('请先在「比赛结果」标签页填写比赛结果');
  }
  const j = judge(b, m.res, m.h, m.a);
  b.settled = true;
  b.settlement = {res:j.res, pay:j.pay, net: j.pay - b.amt, settledAt:new Date().toISOString()};
  save(); renderList();
  const cur = document.querySelector('#tabs .tab.act');
  if (cur) switchTab(cur.getAttribute('dt'));
}

function undoSettle(mid, bid) {
  const m = S.ms.find(x => x.id === mid); if (!m) return;
  const b = m.bets.find(x => x.id === bid); if (!b) return;
  b.settled = false; b.settlement = null;
  save(); renderList();
  const cur = document.querySelector('#tabs .tab.act');
  if (cur) switchTab(cur.getAttribute('dt'));
}

// ===== 结算页面 =====
function renderSettle() {
  const curId = S.cid;
  const allBets = [];
  S.ms.forEach(m => {
    if (curId && m.id !== curId) return; // 只显示当前选中比赛的注单
    m.bets.forEach(b => {
      const hasRes = m.res && (
        b.pt === 'kickoff' ? m.res.kickOff !== '' :
        isFullTimeSet(m.res) || isHalfTimeSet(m.res)
      );
      allBets.push(Object.assign({}, b, {_mid:m.id, _m:m, canSettle:hasRes && !b.settled, settled:b.settled||false}));
    });
  });

  const pending = allBets.filter(b => b.canSettle);
  const settled = allBets.filter(b => b.settled);
  const noRes = allBets.filter(b => !b.canSettle && !b.settled);

  const byUser = {};
  pending.forEach(b => {
    if (!byUser[b.client]) byUser[b.client] = {pending:[], settled:[]};
    byUser[b.client].pending.push(b);
  });
  settled.forEach(b => {
    if (!byUser[b.client]) byUser[b.client] = {pending:[], settled:[]};
    byUser[b.client].settled.push(b);
  });

  let h = '<h3 style="color:#38bdf8;margin-bottom:14px">结算管理</h3>';
  h += '<div class="sg">';
  h += '<div class="sc"><div class="v">'+(pending.length+settled.length+noRes.length)+'</div><div class="l">总注单</div></div>';
  h += '<div class="sc"><div class="v" style="color:#f59e0b">'+(noRes.length?'<span title="请先填写比赛结果">'+noRes.length+' 笔无赛果</span>':'✓')+'</div><div class="l">待结算</div></div>';
  h += '<div class="sc"><div class="v" style="color:#38bdf8">'+pending.length+'</div><div class="l">可结算</div></div>';
  h += '<div class="sc"><div class="v" style="color:#22c55e">'+settled.length+'</div><div class="l">已结算</div></div>';
  h += '</div>';

  // 全部结算按钮
  if (pending.length) {
    h += '<div style="margin:12px 0"><button class="btn" style="background:#38bdf8;color:#fff;font-size:14px;padding:8px 20px" onclick="doSettleAll()">全部结算（'+pending.length+'笔）</button></div>';
  }

  const users = Object.keys(byUser);
  if (users.length) {
    h += '<h4 style="color:#38bdf8;margin:18px 0 10px">按用户结算</h4>';
    users.forEach(client => {
      const u = byUser[client];
      h += '<div style="margin:8px 0;padding:12px;background:#1e293b;border-radius:10px">';
      h += '<div style="display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:8px">';
      h += '<div style="font-weight:600">'+client+'</div>';
      h += '<div style="display:flex;gap:8px;align-items:center;flex-wrap:wrap">';
      h += '<span style="font-size:12px;color:#94a3b8">待结算 '+u.pending.length+' 笔 / 已结算 '+u.settled.length+' 笔</span>';
      if (u.pending.length) {
        h += '<button class="btn" style="background:#38bdf8;color:#fff;font-size:12px;padding:4px 12px" onclick="doSettleUser(this)" data-client="'+client.replace(/"/g,'&quot;')+'">结算该用户（'+u.pending.length+'笔）</button>';
      }
      h += '</div></div>';
      if (u.pending.length) {
        h += '<div style="margin-top:8px;font-size:12px;color:#94a3b8">待结算注单：</div>';
        h += '<div style="margin-top:4px">';
        u.pending.forEach(b => {
          const m2 = b._m;
          const pt = PC[b.pt]||{n:b.pt};
          h += '<span style="display:inline-block;margin:2px 4px 2px 0;padding:3px 8px;background:#0f172a;border-radius:4px;font-size:11px">'+m2.h+' vs '+m2.a+' · '+pt.n+' · '+b.opt+' · '+b.amt+'<button class="btn" style="background:#38bdf8;color:#fff;font-size:10px;padding:1px 6px;margin-left:6px" onclick="doSettleBet(\''+b._mid+'\',\''+b.id+'\')">结</button></span>';
        });
        h += '</div>';
      }
      h += '</div>';
    });
  }

  if (settled.length) {
    h += '<h4 style="color:#22c55e;margin:18px 0 10px">已结算注单（'+settled.length+'笔）</h4>';
    h += '<table><thead><tr><th>客户</th><th>比赛</th><th>玩法</th><th>选项</th><th>金额</th><th>结果</th><th>赔付</th><th>盈亏</th><th>操作</th></tr></thead><tbody>';
    settled.forEach(b => {
      const m2 = b._m;
      const pt = PC[b.pt]||{n:b.pt};
      const sr = b.settlement || {};
      const rl = resLabel(sr.res);
      const pay = sr.pay || 0;
      const net = b.amt - pay; // 庄家视角：正=庄家赚
      h += '<tr><td>'+b.client+'</td><td>'+m2.h+' vs '+m2.a+'</td><td>'+pt.n+'</td><td>'+b.opt+'</td><td>'+b.amt+'</td>';
      h += '<td><span class="tag '+(sr.res==='win'?'t-w':sr.res==='lose'?'t-l':'t-p')+'">'+rl+'</span></td>';
      h += '<td>'+pay.toFixed(1)+'</td>';
      h += '<td style="color:'+(net>=0?'#22c55e':'#ef4444')+';font-weight:600">'+(net>=0?'+':'')+net.toFixed(0)+'</td>';
      h += '<td><button class="btn" style="background:#94a3b8;color:#fff;font-size:11px;padding:3px 8px" onclick="undoSettle(\''+b._mid+'\',\''+b.id+'\')">撤销</button></td></tr>';
    });
    h += '</tbody></table>';
  }
  return h;
}

function doSettleUser(btn) {
  const client = btn.getAttribute('data-client');
  if (!client) return;
  const curId = S.cid;
  let count = 0;
  S.ms.forEach(m => {
    if (curId && m.id !== curId) return; // 只结算当前比赛
    if (!m.res || (!isFullTimeSet(m.res) && !isHalfTimeSet(m.res))) return;
    m.bets.forEach(b => {
      if (b.client !== client || b.settled) return;
      const j = judge(b, m.res, m.h, m.a);
      b.settled = true;
      b.settlement = {res:j.res, pay:j.pay, net: j.pay - b.amt, settledAt:new Date().toISOString()};
      count++;
    });
  });
  save(); renderList();
  alert('已结算 '+count+' 笔注单');
  switchTab('settle');
}

function doSettleAll() {
  const curId = S.cid;
  let count = 0;
  S.ms.forEach(m => {
    if (curId && m.id !== curId) return; // 只结算当前比赛
    if (!m.res || (!isFullTimeSet(m.res) && !isHalfTimeSet(m.res))) return;
    m.bets.forEach(b => {
      if (b.settled) return;
      const j = judge(b, m.res, m.h, m.a);
      b.settled = true;
      b.settlement = {res:j.res, pay:j.pay, net: j.pay - b.amt, settledAt:new Date().toISOString()};
      count++;
    });
  });
  save(); renderList();
  alert('已全部结算 '+count+' 笔注单');
  switchTab('settle');
}

function doAddBet(mid) {
  const m = S.ms.find(x => x.id === mid); if (!m) return;
  const client = getClientInput();
  const pt = document.getElementById('bPT').value;
  const opt = document.getElementById('bOpt').value.trim();
  const amt = parseFloat(document.getElementById('bAmt').value);
  const winAmt = parseFloat(document.getElementById('bWinAmt').value);
  if (!client) return alert('输入客户编号');
  if (!opt) return alert('选择或输入投注选项');
  if (isNaN(amt) || amt <= 0) return alert('输入有效金额');
  if (isNaN(winAmt) || winAmt < 0) return alert('可赢金额（不含本金）必须 >= 0');
  const odds = (amt + winAmt) / amt;
  S.cl.add(client);
  let hc = null, hcS = null;
  if (PC[pt] && PC[pt].hc) {
    const hcStr = document.getElementById('bHC').value.trim();
    if (hcStr) {
      if (hcStr.includes('/')) {
        const parts = hcStr.split('/').map(s => { let v = parseFloat(s.trim()); return isNaN(v) ? NaN : (pt==='ah'||pt==='cah'||pt==='htcah'||pt==='htah') ? Math.abs(v) : v; });
        if (parts.some(isNaN)) return alert('盘口格式不正确');
        hcS = parts; hc = (parts[0]+parts[1])/2;
      } else {
        let v = parseFloat(hcStr);
        if (isNaN(v)) return alert('盘口格式不正确');
        hc = (pt==='ah'||pt==='cah'||pt==='htcah'||pt==='htah') ? Math.abs(v) : v;
      }
    }
  }
  m.bets.push({ id:'b'+Date.now(), client, pt, opt, amt, odds, time:document.getElementById('bTime').value, hc, hcSplit:hcS, createdAt:new Date().toISOString() });
  S.lastClient = client;
  save(); renderList();
  document.getElementById('bOpt').value = '';
  const hcWrap = document.getElementById('hcWrap');
  if (hcWrap) { const hcInput = document.getElementById('bHC'); if (hcInput) hcInput.value = ''; }
  document.getElementById('bAmt').value = '';
  document.getElementById('bWinAmt').value = '';
  document.getElementById('bTime').value = new Date().toTimeString().slice(0,5);
  const oddsEl = document.getElementById('oddsPreview'); if (oddsEl) oddsEl.textContent = '-';
  // 重置客户选择 UI
  const bCsel = document.getElementById('bCsel');
  const bCinp = document.getElementById('bC');
  if (bCsel) {
    bCsel.style.display = 'block';
    // 保持已选中的客户
    if (bCinp) { bCinp.style.display = 'none'; }
  }
  onPTChange();
  document.getElementById('bOpt')?.focus();
  switchTab('bets');
}

// ===== 判定逻辑 =====
function judge(b, res, h, a) {
  const amt = b.amt, odds = b.odds;
  const isHt = PC[b.pt] && PC[b.pt].isHt;

  // 全场玩法需要全场比分（kickoff/先开球不需要比分）
  if (!isHt && b.pt !== 'kickoff') {
    if (!isFullTimeSet(res)) return {res:'pending',pay:0};
  }
  // 上半场玩法需要上半场比分
  if (isHt) {
    if (!isHalfTimeSet(res)) return {res:'pending',pay:0};
  }
  // 角球相关需要角球数据
  if (b.pt === 'corners' || b.pt === 'cah') {
    if (res.cor == null) return {res:'pending',pay:0};
  }
  if (b.pt === 'htcou') {
    if (res.htCor == null) return {res:'pending',pay:0};
  }
  if (b.pt === 'firstg' && res.firstGoal === '') return {res:'pending',pay:0};
  if (b.pt === 'kickoff' && res.kickOff === '') return {res:'pending',pay:0};

  const hg = res.hg, ag = res.ag, tg = hg+ag;
  const isD = hg===ag, hW = hg>ag, aW = hg<ag, bS = hg>0&&ag>0;
  const hth = res.htH||0, hta = res.htA||0, htg = hth+hta;

  switch(b.pt) {
    case '1x2': {
      let win = b.opt===h+'胜' ? hW : b.opt==='平局' ? isD : aW;
      return win ? {res:'win',pay:amt*odds} : {res:'lose',pay:0};
    }
    case 'ah': return jAH(b, res, h, a, hW, aW, isD);
    case 'ou': return jOU(b, tg, b.opt==='大球');
    case 'cs': {
      if (b.opt === '其他') {
        const common = ['0-0','1-0','0-1','1-1','2-0','0-2','2-1','1-2','2-2','3-0','0-3'];
        return common.includes(hg+'-'+ag) ? {res:'lose',pay:0} : {res:'win',pay:amt*odds};
      }
      const [hs,as] = b.opt.split('-').map(Number);
      return (hg===hs&&ag===as) ? {res:'win',pay:amt*odds} : {res:'lose',pay:0};
    }
    case 'btts': {
      let win = b.opt==='是' ? bS : !bS;
      return win ? {res:'win',pay:amt*odds} : {res:'lose',pay:0};
    }
    case 'corners': return jOU(b, res.cor, b.opt==='角球大');
    case 'cah': {
      const hc2 = res.homeCorners||Math.floor(res.cor*0.6);
      const ac2 = res.cor - hc2;
      return jAH(b, {hg:hc2,ag:ac2}, h, a, hc2>ac2, hc2<ac2, false);
    }
    case 'firstg': {
      if (hg===0&&ag===0) return b.opt==='无进球' ? {res:'win',pay:amt*odds} : {res:'lose',pay:0};
      return res.firstGoal === b.opt.replace('首球','') ? {res:'win',pay:amt*odds} : {res:'lose',pay:0};
    }
    case 'htcs': {
      const [hs,as] = b.opt.split('-').map(Number);
      return (hth===hs&&hta===as) ? {res:'win',pay:amt*odds} : {res:'lose',pay:0};
    }
    case 'ht1x2': {
      const htHWin = hth>hta, htD = hth===hta, htAW = hth<hta;
      let win = b.opt===h+'胜' ? htHWin : b.opt==='平局' ? htD : htAW;
      return win ? {res:'win',pay:amt*odds} : {res:'lose',pay:0};
    }
    case 'htah': {
      return jAH(b, {hg:hth,ag:hta}, h, a, hth>hta, hth<hta, hth===hta);
    }
    case 'htou': {
      return jOU(b, htg, b.opt==='上半场大球');
    }
    case 'htcah': {
      // 上半场角球让球：用上半场角球数，主队上半场角球数估算为 htCor*0.6
      const homeHtCor = res.homeHtCorners||Math.floor((res.htCor||0)*0.6);
      const awayHtCor = (res.htCor||0) - homeHtCor;
      return jAH(b, {hg:homeHtCor,ag:awayHtCor}, h, a, homeHtCor>awayHtCor, homeHtCor<awayHtCor, false);
    }
    case 'htcou': return jOU(b, res.htCor, b.opt==='上半场角球大');
    case 'kickoff': {
      // 只比较开球结果，别的都不管；不区分大小写，trim防空格
      const ko = (res.kickOff || '').trim().toLowerCase();
      const opt = (b.opt || '').trim().toLowerCase();
      return ko === opt ? {res:'win',pay:amt*odds} : {res:'lose',pay:0};
    }
    default: return {res:'lose',pay:0};
  }
}

function jAH(b, r, h, a, hW, aW, isD) {
  const amt = b.amt, odds = b.odds;
  const isH = b.opt.includes(h);
  if (b.hcSplit) {
    const [lo,hi] = b.hcSplit;
    const eL = r.hg - lo, eH = r.hg - hi;
    const lW = isH ? (eL > r.ag) : (eL < r.ag), lP = eL === r.ag;
    const hW2 = isH ? (eH > r.ag) : (eH < r.ag), hP = eH === r.ag;
    if (lW&&hW2) return {res:'win',pay:amt*odds};
    if (!lW&&!hW2&&!lP&&!hP) return {res:'lose',pay:0};
    if ((lW&&hP)||(hW2&&lP)) return {res:'half-win',pay:amt*(odds+1)/2};
    if ((!lW&&lP&&!hW2)||(!hW2&&hP&&!lW)) return {res:'half-lose',pay:amt/2};
    return {res:'push',pay:amt};
  } else {
    if (b.hc === null) return {res:'push',pay:amt};
    const eff = r.hg - b.hc;
    const win = isH ? (eff > r.ag) : (eff < r.ag);
    const push = eff === r.ag;
    if (push) return {res:'push',pay:amt};
    return win ? {res:'win',pay:amt*odds} : {res:'lose',pay:0};
  }
}

function jOU(b, actual, isOver) {
  const amt = b.amt, odds = b.odds;
  if (b.hcSplit) {
    const [lo,hi] = b.hcSplit;
    const lW = isOver ? (actual>lo) : (actual<lo), lP = actual===lo;
    const hW2 = isOver ? (actual>hi) : (actual<hi), hP = actual===hi;
    if (lW&&hW2) return {res:'win',pay:amt*odds};
    if (!lW&&!hW2&&!lP&&!hP) return {res:'lose',pay:0};
    if ((lW&&hP)||(hW2&&lP)) return {res:'half-win',pay:amt*(odds+1)/2};
    if ((!lW&&lP&&!hW2)||(!hW2&&hP&&!lW)) return {res:'half-lose',pay:amt/2};
    return {res:'push',pay:amt};
  } else {
    if (b.hc === null) return {res:'push',pay:amt};
    const win = isOver ? (actual>b.hc) : (actual<b.hc);
    const push = actual === b.hc;
    if (push) return {res:'push',pay:amt};
    return win ? {res:'win',pay:amt*odds} : {res:'lose',pay:0};
  }
}

function resLabel(r) {
  return r==='win'?'全赢':r==='half-win'?'半赢':r==='half-lose'?'半输':r==='push'?'走盘':r==='pending'?'待结算':'全输';
}

    ...existing,
    htH, htA,
    htCor: getNum('rHC'),
    hg: existing.hg != null ? existing.hg : null,
    ag: existing.ag != null ? existing.ag : null,
    cor: existing.cor != null ? existing.cor : null,
    firstGoal: document.getElementById('rFG').value || (existing.firstGoal||''),
    kickOff: document.getElementById('rKO').value || (existing.kickOff||''),
  };
  save(); renderList(); alert('上半场结果已保存，上半场注单已可结算！');
  switchTab('analysis');
}

function saveFullResult(id) {
  const m = S.ms.find(x => x.id === id); if (!m) return;
  const hg = getNum('rH'), ag = getNum('rA');
  if (hg == null || ag == null) return alert('请填写全场比分');
  const existing = m.res || {};
  m.res = {
    ...existing,
    hg, ag,
    cor: getNum('rC'),
    firstGoal: document.getElementById('rFG').value || (existing.firstGoal||''),
    kickOff: document.getElementById('rKO').value || (existing.kickOff||''),
    htH: existing.htH != null ? existing.htH : getNum('rHH'),
    htA: existing.htA != null ? existing.htA : getNum('rHA'),
    htCor: existing.htCor != null ? existing.htCor : getNum('rHC'),
  };
  save(); renderList(); alert('全场结果已保存，全部注单已可结算！');
  switchTab('analysis');
}

function clearResult(id) {
  const m = S.ms.find(x => x.id === id); if (!m) return;
  m.res = null; save(); renderList(); switchTab('result');
}

// ===== 盈亏分析 =====
function renderAnalysis(m) {
  if (!m.res) return '<h3 style="color:#38bdf8">盈亏分析</h3><p style="color:#f59e0b;padding:16px;background:#f59e0b22;border-radius:8px;margin-top:12px">请先填写比赛结果</p><button class="btn btn-a" style="margin-top:10px" onclick="switchTab(\'result\')">前往填写</button>';

  const h = m.h, a = m.a, r = m.res;
  const hasHt = isHalfTimeSet(r);
  const hasFt = isFullTimeSet(r);

  // 分两组（最新下单排最前）
  const htBets = sortBetsNewest(m.bets.filter(b => PC[b.pt] && PC[b.pt].isHt));
  const ftBets = sortBetsNewest(m.bets.filter(b => PC[b.pt] && !PC[b.pt].isHt));
  const allBets = sortBetsNewest(m.bets);

  let h2 = '<h3 style="color:#38bdf8;margin-bottom:14px">盈亏分析 — '+m.h+' vs '+m.a+'</h3>';

  // 上半场结算区块（仅上半场玩法注单）
  if (hasHt) {
    h2 += renderSettleSection(m, htBets, r, h, a, '上半场结算（仅上半场玩法）', '#f59e0b');
  }
  // 全场结算区块（所有注单 = 上半场玩法 + 全场玩法）
  if (hasFt) {
    h2 += renderSettleSection(m, allBets, r, h, a, '全场结算（上下半场总和）', '#38bdf8');
  }
  // 待结算提示
  if (hasHt && !hasFt) {
    const pendingFt = ftBets.length;
    if (pendingFt > 0) {
      h2 += '<p style="color:#94a3b8;padding:10px;background:#94a3b822;border-radius:8px;margin:10px 0">还有 '+pendingFt+' 笔全场注单待结算（全场结果录入后可结算）</p>';
    }
  }

  // 全部注单汇总（实时判定，不受旧 settlement 数据影响）
  const allResults = m.bets.map(b => {
    const j = judge(b, r, h, a);
    const net = j.res === 'pending' ? null : b.amt - j.pay; // 庄家视角：正=庄家赚
    return {...b, ...j, net};
  });
  const inc = allResults.reduce((s,r) => s+r.amt, 0);
  const pay = allResults.filter(r => r.res!=='pending').reduce((s,r) => s+r.pay, 0);
  const net = inc - pay; // 庄家总盈亏：正=庄家赚

  const commission = inc * 0.03;          // 水钱：投注额 × 3%
  const netAfterComm = net - commission;  // 税后净利润

  h2 += '<h4 style="color:#38bdf8;margin:18px 0 10px">全部注单汇总</h4>';
  h2 += '<div class="sg">';
  h2 += '<div class="sc"><div class="v">'+inc.toFixed(0)+'</div><div class="l">总投注额</div></div>';
  h2 += '<div class="sc"><div class="v" style="color:'+(pay>0?'#ef4444':'#22c55e')+'">'+pay.toFixed(0)+'</div><div class="l">已结算赔付</div></div>';
  h2 += '<div class="sc"><div class="v" style="color:'+(net>=0?'#22c55e':'#ef4444')+'">'+(net>=0?'+':'')+net.toFixed(0)+'</div><div class="l">毛利润（未扣水钱）</div></div>';
  h2 += '<div class="sc"><div class="v" style="color:#f59e0b">-'+commission.toFixed(0)+'</div><div class="l">水钱（投注额×3%）</div></div>';
  h2 += '<div class="sc"><div class="v" style="color:'+(netAfterComm>=0?'#22c55e':'#ef4444')+';font-size:20px;font-weight:700">'+(netAfterComm>=0?'+':'')+netAfterComm.toFixed(0)+'</div><div class="l">税后净利润</div></div>';
  h2 += '<div class="sc"><div class="v">'+(hasFt?'全部结算':'部分结算')+'</div><div class="l">结算状态</div></div>';
  h2 += '</div>';

  // 全部注单明细
  h2 += '<h4 style="color:#38bdf8;margin:16px 0 10px">全部注单明细</h4>';
  h2 += '<table><thead><tr><th>客户</th><th>玩法</th><th>选项</th><th>盘口</th><th>金额</th><th>赔率</th><th>可赢</th><th>结果</th><th>赔付</th><th>盈亏</th></tr></thead><tbody>';
  h2 += allResults.map(r => {
    const pt = PC[r.pt]||{n:r.pt};
    let hc = '-';
    if (r.hc !== null) hc = r.hcSplit ? r.hcSplit.join('/') : r.hc;
    const isPending = r.res === 'pending';
    const tagClass = isPending ? 't-pn' : (r.res==='win'?'t-w':r.res==='lose'?'t-l':'t-p');
    const winAmt = r.res==='pending' ? calcWinAmt(r.amt, r.odds) : (r.res==='win'||r.res==='half-win') ? (r.pay - r.amt).toFixed(0) : '-';
    return '<tr><td>'+r.client+'</td><td>'+pt.n+(PC[r.pt]&&PC[r.pt].isHt?'<span class="ht-badge">上半场</span>':'')+'</td><td>'+r.opt+'</td><td>'+hc+'</td><td>'+r.amt+'</td><td>'+r.odds+'</td><td style="color:#22c55e;font-weight:600">'+winAmt+'</td>' +
      '<td><span class="tag '+tagClass+'">'+resLabel(r.res)+'</span></td>' +
      '<td>'+(isPending?'-':(r.pay>0?r.pay.toFixed(1):'-'))+'</td>' +
      '<td style="color:'+(r.net===null?'#94a3b8':(r.net>=0?'#22c55e':'#ef4444'))+';font-weight:600">'+(r.net===null?'待结算':(r.net>=0?'+':'')+r.net.toFixed(0))+'</td></tr>';
  }).join('');
  h2 += '</tbody></table>';

  return h2;
}

function renderSettleSection(m, bets, res, h, a, title, color) {
  if (!bets.length) return '';
  // 实时判定，不用旧的 settlement 数据
  const results = bets.map(b => {
    const j = judge(b, res, h, a);
    const net = j.res === 'pending' ? null : b.amt - j.pay; // 庄家视角：正=庄家赚
    return {...b, ...j, net};
  });
  const inc = bets.reduce((s,b) => s+b.amt, 0);
  const pay = results.reduce((s,r) => s+r.pay, 0);
  const net = inc - pay; // 庄家总盈亏：正=庄家赚

  let h2 = '<div style="margin:14px 0;padding:12px;border:1px solid '+color+'44;border-radius:10px">';
  h2 += '<h4 style="color:'+color+';margin:0 0 10px">'+title+'</h4>';
  h2 += '<div class="sg">';
  h2 += '<div class="sc"><div class="v">'+inc.toFixed(0)+'</div><div class="l">投注额</div></div>';
  h2 += '<div class="sc"><div class="v" style="color:'+(pay>0?'#ef4444':'#22c55e')+'">'+pay.toFixed(0)+'</div><div class="l">赔付</div></div>';
  h2 += '<div class="sc"><div class="v" style="color:'+(net>=0?'#22c55e':'#ef4444')+'">'+(net>=0?'+':'')+net.toFixed(0)+'</div><div class="l">净利润</div></div>';
  h2 += '</div>';
  h2 += '<table style="margin-top:10px"><thead><tr><th>客户</th><th>玩法</th><th>选项</th><th>盘口</th><th>金额</th><th>赔率</th><th>可赢</th><th>结果</th><th>赔付</th><th>盈亏</th></tr></thead><tbody>';
  h2 += results.map(r => {
    const pt = PC[r.pt]||{n:r.pt};
    let hc = '-';
    if (r.hc !== null) hc = r.hcSplit ? r.hcSplit.join('/') : r.hc;
    const winAmt = r.res==='pending' ? calcWinAmt(r.amt, r.odds) : (r.res==='win'||r.res==='half-win') ? (r.pay - r.amt).toFixed(0) : '-';
    const tagClass = r.res==='pending' ? 't-pn' : (r.res==='win'?'t-w':r.res==='lose'?'t-l':'t-p');
    return '<tr><td>'+r.client+'</td><td>'+pt.n+'</td><td>'+r.opt+'</td><td>'+hc+'</td><td>'+r.amt+'</td><td>'+r.odds+'</td><td style="color:#22c55e;font-weight:600">'+winAmt+'</td>' +
      '<td><span class="tag '+tagClass+'">'+resLabel(r.res)+'</span></td>' +
      '<td>'+(r.pay>0?r.pay.toFixed(1):'-')+'</td>' +
      '<td style="color:'+(r.net===null?'#94a3b8':(r.net>=0?'#22c55e':'#ef4444'))+';font-weight:600">'+(r.net===null?'待结算':(r.net>=0?'+':'')+r.net.toFixed(0))+'</td></tr>';
  }).join('');
  h2 += '</tbody></table></div>';
  return h2;
}

  let html = '';
  html += '<div style="margin-bottom:16px"><b style="color:#e2e8f0">当前比赛：</b>'+m.h+' vs '+m.a+'</div>';

  html += '<div style="flex:1;min-width:160px"><label style="font-size:13px;color:#94a3b8">估算全场角球</label><input id="simCor" type="number" min="0" max="30" value="10" style="margin-top:4px;width:100%"></div>';

// ===== 赛前模拟（全场：比分+角球+开球，统一总盈亏）=====
function runSim(mid) {
  const m = S.ms.find(x => x.id === mid); if (!m) return;
  const max = parseInt(document.getElementById('simMax').value) || 5;
  const baseCor = parseInt(document.getElementById('simCor')?.value) || 10;
  const baseKO = document.getElementById('simKO')?.value || '';
  const estHtCor = Math.floor(baseCor * 0.45);  // 上半场角球按全场×0.45估算
  const h = m.h, a = m.a;

  // 全场注单（上半场注单不纳入全场模拟）
  const ftBets = m.bets.filter(b => {
    const cfg = PC[b.pt];
    return !cfg || !cfg.isHt;
  });

  if (!ftBets.length) {
    const el = document.getElementById('simResult');
    if (el) el.innerHTML = '<div style="color:#94a3b8;padding:40px;text-align:center">当前比赛没有全场注单，无法模拟</div>';
    return;
  }

  let html = '';
  html += '<h4 style="color:#38bdf8;margin:18px 0 10px;padding-bottom:6px;border-bottom:1px solid #38bdf844">⚽ 全场赛前模拟（总盈亏）</h4>';
  html += '<p style="color:#94a3b8;font-size:12px;margin-bottom:8px">设定：全场角球='+baseCor+'（上半场估算='+estHtCor+'）；先开球='+(baseKO||'未知')+'。修改上方设定后重新运行可看不同场景。</p>';

  const incFt = ftBets.reduce((s,b) => s+b.amt, 0);
  let ftCells = '';
  let ftBest = [-Infinity,''], ftWorst = [Infinity,''];

  for (let hg = 0; hg <= max; hg++) {
    for (let ag = 0; ag <= max; ag++) {
      const htH = Math.floor(hg/2), htA = Math.floor(ag/2);
      const r = { hg, ag, htH, htA, cor:baseCor, htCor:estHtCor, firstGoal:'', kickOff:baseKO };

      // 实际总赔付：所有全场注单（无条件加 j.pay）
      let totalPay = 0;
      ftBets.forEach(b => {
        const j = judge(b, r, h, a);
        totalPay += j.pay;
      });

      const pnl = incFt - totalPay;

      if (pnl > ftBest[0]) { ftBest[0] = pnl; ftBest[1] = hg+'-'+ag; }
      if (pnl < ftWorst[0]) { ftWorst[0] = pnl; ftWorst[1] = hg+'-'+ag; }

      const it = Math.min(1, Math.abs(pnl)/Math.max(1,incFt)*1.5);
      const bg = pnl >= 0 ? 'rgba(34,197,94,'+(0.15+it*0.6)+')' : 'rgba(239,68,68,'+(0.15+it*0.6)+')';
      const koStr = baseKO.replace(/'/g, "\\'");
      ftCells += '<div class="pc" style="background:'+bg+';color:'+(pnl>=0?'#22c55e':'#ef4444')+'" title="'+hg+'-'+ag+': '+(pnl>=0?'+':'')+pnl.toFixed(0)+'" onclick="applySim('+hg+','+ag+','+baseCor+',\''+koStr+'\')"><div>'+hg+'-'+ag+'</div><div style="font-weight:700;font-size:11px">'+(pnl>=0?'+':'')+pnl.toFixed(0)+'</div></div>';
    }
  }

  html += '<div class="sg" style="margin:8px 0"><div class="sc"><div class="v" style="color:#22c55e">'+ftBest[1]+'</div><div class="l">最佳（盈 '+ftBest[0].toFixed(0)+'）</div></div><div class="sc"><div class="v" style="color:#ef4444">'+ftWorst[1]+'</div><div class="l">最差（亏 '+ftWorst[0].toFixed(0)+'）</div></div><div class="sc"><div class="v">'+incFt.toFixed(0)+'</div><div class="l">总注额</div></div></div>';
  html += '<div class="pnl-m">'+ftCells+'</div>';

  // --- 敏感性分析：不同角球数量（按最佳比分）---
  const [bestHg, bestAg] = ftBest[1].split('-').map(Number);
  html += '<h5 style="color:#38bdf8;margin:16px 0 6px">敏感性：不同角球数量的总盈亏（按最佳比分 '+ftBest[1]+' 计算）</h5>';
  html += '<div class="pnl-m">';
  const corMax = Math.max(20, baseCor+10);
  for (let cor = 0; cor <= corMax; cor++) {
    const htCorEst = Math.floor(cor * 0.45);
    const r = { hg:bestHg, ag:bestAg, htH:Math.floor(bestHg/2), htA:Math.floor(bestAg/2), cor, htCor:htCorEst, firstGoal:'', kickOff:baseKO };
    let totalPay = 0;
    ftBets.forEach(b => { const j = judge(b, r, h, a); totalPay += j.pay; });
    const pnlCor = incFt - totalPay;
    const it = Math.min(1, Math.abs(pnlCor)/Math.max(1,incFt)*1.5);
    const bg = pnlCor >= 0 ? 'rgba(34,197,94,'+(0.15+it*0.6)+')' : 'rgba(239,68,68,'+(0.15+it*0.6)+')';
    const isBase = cor === baseCor;
    html += '<div class="pc" style="background:'+bg+';color:'+(pnlCor>=0?'#22c55e':'#ef4444')+';width:56px;height:38px;font-size:10px;border:'+(isBase?'2px solid #38bdf8':'none')+'" title="角球'+cor+'（上半场估算'+htCorEst+'）：'+(pnlCor>=0?'+':'')+pnlCor.toFixed(0)+'"><div>'+cor+'球</div><div style="font-weight:700">'+(pnlCor>=0?'+':'')+pnlCor.toFixed(0)+'</div></div>';
  }
  html += '</div>';
  html += '<p style="color:#94a3b8;font-size:12px">蓝边框 = 当前设定值；上半场角球按全场×0.45估算</p>';

  // --- 敏感性分析：不同先开球结果 ---
  if (ftBets.some(b => b.pt === 'kickoff')) {
    html += '<h5 style="color:#38bdf8;margin:16px 0 6px">敏感性：不同先开球的总盈亏（按最佳比分 '+ftBest[1]+'、角球 '+baseCor+' 计算）</h5>';
    html += '<div style="display:flex;gap:12px;flex-wrap:wrap">';
    [h, a, ''].forEach(team => {
      const r = { hg:bestHg, ag:bestAg, htH:Math.floor(bestHg/2), htA:Math.floor(bestAg/2), cor:baseCor, htCor:estHtCor, firstGoal:'', kickOff:team };
      let totalPay = 0;
      ftBets.forEach(b => { const j = judge(b, r, h, a); totalPay += j.pay; });
      const pnlKO = incFt - totalPay;
      const label = team || '未知';
      const isBase = team === baseKO;
      const bg = pnlKO >= 0 ? '#22c55e22' : '#ef444422';
      const border = pnlKO >= 0 ? '#22c55e' : '#ef4444';
      html += '<div style="flex:1;min-width:120px;padding:12px;background:'+bg+';border:'+(isBase?'2px solid #38bdf8':'1px solid '+border)+';border-radius:8px;text-align:center"><div style="font-weight:600;margin-bottom:4px">'+label+'</div><div style="font-size:18px;font-weight:700;color:'+(pnlKO>=0?'#22c55e':'#ef4444')+'">'+(pnlKO>=0?'+':'')+pnlKO.toFixed(0)+'</div></div>';
    });
    html += '</div>';
  }

  const el = document.getElementById('simResult');
  if (el) el.innerHTML = html;
}




// 填入上半场角球


function applySim(hg, ag, cor, kickOff) {
  const htCor = Math.floor(cor * 0.45);  // 上半场角球按全场×0.45估算
  switchTab('result');
  setTimeout(() => {
    const e1 = document.getElementById('rH'), e2 = document.getElementById('rA');
    if (e1) e1.value = hg;
    if (e2) e2.value = ag;
    const e3 = document.getElementById('rHH'), e4 = document.getElementById('rHA');
    if (e3) e3.value = Math.floor(hg/2);
    if (e4) e4.value = Math.floor(ag/2);
    const e5 = document.getElementById('rC'), e6 = document.getElementById('rHC');
    if (e5) e5.value = cor || '';
    if (e6) e6.value = htCor;
    const e7 = document.getElementById('rKO');
    if (e7 && kickOff) e7.value = kickOff;
  }, 100);
}


function applyCor(cor) {
  switchTab('result');
  setTimeout(() => {
    const e5 = document.getElementById('rC'), e6 = document.getElementById('rHC');
    if (e5) e5.value = cor;
    if (e6) e6.value = htCor;
  }, 100);
}

function renderHistory() {
  let h = '<h3 style="color:#38bdf8;margin-bottom:14px">历史记录</h3>';
  h += '<div style="display:flex;gap:12px;flex-wrap:wrap;margin-bottom:14px;align-items:flex-end">';

  h += '<div style="flex:1;min-width:180px"><label style="font-size:13px;color:#94a3b8">按客户</label><select id="hfC" onchange="renderHistTable()" style="margin-top:4px;width:100%"><option value="">全部</option>'+Array.from(S.cl).map(c => '<option value="'+c+'">'+c+'</option>').join('')+'</select></div>';
  h += '<div style="flex:1;min-width:140px"><label style="font-size:13px;color:#94a3b8">起始日期</label><input id="hfF" type="date" onchange="renderHistTable()" style="margin-top:4px"></div>';
  h += '<div style="flex:1;min-width:140px"><label style="font-size:13px;color:#94a3b8">结束日期</label><input id="hfT" type="date" onchange="renderHistTable()" style="margin-top:4px"></div>';

}

function renderHistTable() {
  const el = document.getElementById('histTable'); if (!el) return;
  const mid = document.getElementById('hfM')?.value;
  const client = document.getElementById('hfC')?.value;
  const dF = document.getElementById('hfF')?.value;
  const dT = document.getElementById('hfT')?.value;
  let bets = [];
  S.ms.forEach(m => {
    if (mid && m.id !== mid) return;
    m.bets.forEach(b => {
      if (client && b.client !== client) return;
      if (dF && (b.createdAt||'') < dF) return;
      if (dT && (b.createdAt||'') > dT+'T23:59:59') return;
      bets.push({...b, mName:m.h+' vs '+m.a, mId:m.id, res:m.res});
    });
  });
  bets = sortBetsNewest(bets);
  if (bets.length === 0) { el.innerHTML = '<p style="color:#94a3b8;padding:16px">暂无记录</p>'; return; }
  let table = '<table><thead><tr><th>比赛</th><th>客户</th><th>玩法</th><th>选项</th><th>金额</th><th>赔率</th><th>可赢</th><th>赛果</th><th>盈亏</th></tr></thead><tbody>';
  table += bets.map(b => {
    let pnl = '-';
    if (b.res) {
      const m2 = S.ms.find(x => x.id === b.mId);
      if (m2) {
        const j = judge(b, b.res, m2.h, m2.a);
        if (j.res === 'pending') {
          pnl = '<span style="color:#94a3b8">待结算</span>';
        } else {
          let net;
          if (j.res==='win') net = -(j.pay-b.amt);
          else if (j.res==='half-win') net = -(j.pay-b.amt);
          else if (j.res==='half-lose') net = b.amt-j.pay;
          else if (j.res==='push') net = 0;
          else net = b.amt;
          pnl = '<span style="color:'+(net>=0?'#22c55e':'#ef4444')+';font-weight:600">'+(net>=0?'+':'')+net.toFixed(0)+'</span>';
        }
      }
    }
    const pt = PC[b.pt]||{n:b.pt};
    const resStr = b.res ? (isFullTimeSet(b.res) ? b.res.hg+'-'+b.res.ag : (isHalfTimeSet(b.res)?'上半场 '+b.res.htH+'-'+b.res.htA:'未结束')) : '未结束';
    const winAmt = calcWinAmt(b.amt, b.odds);
    return '<tr><td>'+b.mName+'</td><td>'+b.client+'</td><td>'+pt.n+'</td><td>'+b.opt+'</td><td>'+b.amt+'</td><td>'+b.odds+'</td><td style="color:#22c55e;font-weight:600">'+winAmt+'</td><td>'+resStr+'</td><td>'+pnl+'</td></tr>';
  }).join('');  table += '</tbody></table>';
  el.innerHTML = table;
}

function renderUser() {
  if (!S.cl.size) return '<h3 style="color:#38bdf8">用户分析</h3><p style="color:#94a3b8;margin-top:12px">暂无客户数据</p>';
