function renderUserDetail() {
  const client = document.getElementById('uSel')?.value;
  const el = document.getElementById('uDetail');
  if (!el || !client) { if(el) el.innerHTML = ''; return; }
  let bets = [];
  S.ms.forEach(m => {
    m.bets.forEach(b => {
      if (b.client === client) bets.push({...b, mName:m.h+' vs '+m.a, mTime:m.time, res:m.res, mId:m.id});
    });
  });
  bets = sortBetsNewest(bets);
  if (!bets.length) { el.innerHTML = '<p style="color:#94a3b8">该客户暂无注单</p>'; return; }

  function calc(bs) {
    let stake = 0, pay = 0;
    bs.forEach(b => {
      stake += b.amt;
      if (b.res) {
        const m2 = S.ms.find(x => x.id === b.mId);
        if (m2) {
          const j = judge(b, b.res, m2.h, m2.a);
          pay += j.pay;
        }
      }
    });
    return {stake, pay, userNet:pay-stake, houseNet:stake-pay}; // userNet: 正=用户赢; houseNet: 正=庄家赚
  }
  const total = calc(bets);
  const byM = {};
  bets.forEach(b => { if (!byM[b.mName]) byM[b.mName] = []; byM[b.mName].push(b); });
  const byD = {};
  bets.forEach(b => { const d = (b.mTime||b.createdAt||'').slice(0,10); if (!byD[d]) byD[d] = []; byD[d].push(b); });
  // 按周/按月已移除

  function rTbl(data) {
    const keys = Object.keys(data).sort();
    if (!keys.length) return '';
    let t = '<table><thead><tr><th>维度</th><th>注单</th><th>投注额</th><th>赔付</th><th>盈亏</th></tr></thead><tbody>';
    t += keys.map(k => {
      const c = calc(data[k]);
      const pnl = c.houseNet; // 庄家视角盈亏
      return '<tr><td>'+k+'</td><td>'+data[k].length+'</td><td>'+c.stake.toFixed(0)+'</td><td>'+c.pay.toFixed(0)+'</td><td style="color:'+(pnl>=0?'#22c55e':'#ef4444')+';font-weight:600">'+(pnl>=0?'+':'')+pnl.toFixed(0)+'</td></tr>';
    }).join('');
    t += '</tbody></table>';
    return t;
  }

  let out = '';
  const userNet = total.userNet; // 用户净赢（正=用户赢）
  const houseNet = total.houseNet; // 庄家净赚（正=庄家赚）
  out += '<div class="sg">';
  out += '<div class="sc"><div class="v">'+bets.length+'</div><div class="l">总注单</div></div>';
  out += '<div class="sc"><div class="v">'+total.stake.toFixed(0)+'</div><div class="l">总投注</div></div>';
  out += '<div class="sc"><div class="v" style="color:#38bdf8">'+total.pay.toFixed(0)+'</div><div class="l">总赔付（含本金）</div></div>';
  out += '<div class="sc"><div class="v" style="color:'+(houseNet>=0?'#22c55e':'#ef4444')+'">'+(houseNet>=0?'+':'')+houseNet.toFixed(0)+'</div><div class="l">净利润（庄家）</div></div>';
  out += '</div>';
  // ===== 余额功能 =====
  if (!S.bl[client]) S.bl[client] = { credit: 0, txns: [] };
  const bl = S.bl[client];
  // 余额 = 累计充值 + 用户净赢（赢的钱）
  const displayBalance = bl.credit + total.userNet;

  out += '<h4 style="color:#f59e0b;margin:16px 0 10px;padding-bottom:6px;border-bottom:1px solid #f59e0b44">💰 用户余额（预付费）</h4>';
  out += '<div class="sg" style="margin-bottom:10px">';
  out += '<div class="sc"><div class="v" style="color:#38bdf8">'+bl.credit.toFixed(0)+'</div><div class="l">累计充值</div></div>';
  out += '<div class="sc"><div class="v" style="color:#94a3b8">'+total.pay.toFixed(0)+'</div><div class="l">累计赔付给用户</div></div>';
  out += '<div class="sc"><div class="v" style="color:'+(displayBalance>=0?'#22c55e':'#ef4444')+';font-size:20px;font-weight:700">'+(displayBalance>=0?'+':'')+displayBalance.toFixed(0)+'</div><div class="l">当前余额</div></div>';
  out += '</div>';
  // 充值记录
  out += '<div style="display:flex;gap:8px;align-items:flex-end;margin-bottom:8px;flex-wrap:wrap">';
  out += '<div><label style="font-size:12px;color:#94a3b8">充值金额</label><input id="blAmt" type="number" min="1" placeholder="输入充值金额" style="margin-top:3px;width:130px"></div>';
  out += '<div><label style="font-size:12px;color:#94a3b8">备注（可选）</label><input id="blNote" placeholder="如：20250618预付" style="margin-top:3px;width:150px"></div>';
  out += '<button class="btn" style="background:#f59e0b;color:#fff" onclick="doRecharge(\'' + client + '\')">确认充值</button>';
  out += '</div>';
  // 充值明细
  if (bl.txns.length) {
    out += '<details style="margin-bottom:10px"><summary style="color:#94a3b8;font-size:13px;cursor:pointer">充值记录（'+bl.txns.length+'条）</summary>';
    out += '<table style="margin-top:6px"><thead><tr><th>时间</th><th>金额</th><th>备注</th></tr></thead><tbody>';
    out += bl.txns.slice().reverse().map(t => '<tr><td>'+t.at.slice(0,16).replace('T',' ')+'</td><td style="color:#38bdf8">+'+t.amt+'</td><td>'+t.note+'</td></tr>').join('');
    out += '</tbody></table></details>';
  }

  out += '<h4 style="color:#38bdf8;margin:16px 0 10px">按场次</h4>'+rTbl(byM);
  out += '<h4 style="color:#38bdf8;margin:16px 0 10px">按天</h4>'+rTbl(byD);
  out += '<h4 style="color:#38bdf8;margin:16px 0 10px">全部注单</h4>';
  out += '<table><thead><tr><th>比赛</th><th>玩法</th><th>选项</th><th>金额</th><th>赔率</th><th>赔付（含本金）</th><th>赛果</th><th>庄家盈亏</th></tr></thead><tbody>';
  out += bets.map(b => {
    let housePnlStr = '-';
    let payStr = '-';
    const resStr = b.res ? (isFullTimeSet(b.res) ? b.res.hg+'-'+b.res.ag : (isHalfTimeSet(b.res)?'上半场 '+b.res.htH+'-'+b.res.htA:'未结束')) : '未结束';
    if (b.res) {
      const m2 = S.ms.find(x => x.id === b.mId);
      if (m2) {
        const j = judge(b, b.res, m2.h, m2.a);
        if (j.res === 'pending') {
          housePnlStr = '<span style="color:#94a3b8">待结算</span>';
          payStr = '<span style="color:#94a3b8">待结算</span>';
        } else {
          // 庄家视角：正=庄家赚
          const housePnl = b.amt - j.pay;
          housePnlStr = '<span style="color:'+(housePnl>=0?'#22c55e':'#ef4444')+';font-weight:600">'+(housePnl>=0?'+':'')+housePnl.toFixed(0)+'</span>';
          payStr = j.pay.toFixed(0);
        }
      }
    }
    const pt = PC[b.pt]||{n:b.pt};
    return '<tr><td>'+b.mName+'</td><td>'+pt.n+'</td><td>'+b.opt+'</td><td>'+b.amt+'</td><td>'+b.odds+'</td><td>'+payStr+'</td><td>'+resStr+'</td><td>'+housePnlStr+'</td></tr>';
  }).join('');
  out += '</tbody></table>';
  el.innerHTML = out;
}

// ===== 导入导出 =====
// ===== 启动 =====

// ===== 云同步配置 =====
const API_BASE = location.origin;
let _saveTimer = null;
let _lastSyncTs = 0;
let _lastVersion = 0;
let _isSyncing = false;
let _pollTimer = null;
let _conflictRetries = 0;

// ===== 存储（本地缓存 + 云同步）=====
function save() {
  try {
    localStorage.setItem('fpnl3', JSON.stringify({
      ms: S.ms,
      cs: Array.from(S.cl),
      bl: S.bl
    }));
  } catch(e) {}
  if (_saveTimer) clearTimeout(_saveTimer);
  _saveTimer = setTimeout(() => {
    saveToServer();
  }, 500);
}

async function saveToServer() {
  if (_isSyncing) return;
  // 财务账户不能写入
  if (_auth && _auth.role !== 'admin') return;
  _isSyncing = true;
  setSyncStatus('syncing');
  try {
    const token = getAuthToken();
    const headers = { 'Content-Type': 'application/json' };
    if (token) headers['x-auth-token'] = token;
    const resp = await fetch(API_BASE + '/api/data', {
      method: 'PUT',
      headers,
      body: JSON.stringify({ ms: S.ms, cs: Array.from(S.cl), bl: S.bl, _version: _lastVersion })
    });
    if (resp.ok) {
      const r = await resp.json();
      _lastSyncTs = r.lastModified || 0;
      _lastVersion = r.version || 0;
      _conflictRetries = 0;
      setSyncStatus('online');
    } else if (resp.status === 401) {
      // 登录过期
      setSyncStatus('error');
      doLogout();
    } else if (resp.status === 403) {
      // 权限不足（财务账户尝试写入）
      setSyncStatus('online');
      console.warn('财务账户无写入权限，数据仅在本地保存');
    } else if (resp.status === 409) {
      // 并发冲突：自动合并冲突数据
      const r = await resp.json();
      console.warn('数据冲突，自动合并...');
      if (_conflictRetries < 3) {
        _conflictRetries++;
        _isSyncing = false;
        await mergeConflict(r.serverData);
        return saveToServer(); // 重试
      } else {
        setSyncStatus('conflict');
        alert('数据同步冲突，无法自动解决。请刷新页面获取最新数据。');
      }
    } else {
      setSyncStatus('error');
    }
  } catch(e) {
    setSyncStatus('offline');
  }
  _isSyncing = false;
}

// 冲突合并：服务器数据优先于本地数据（但保留本地未提交的修改）
async function mergeConflict(serverData) {
  // 用服务器数据替换本地状态
  S.ms = serverData.ms || [];
  S.cl = new Set(serverData.cs || []);
  S.bl = serverData.bl || {};
  _lastVersion = serverData._version || 0;
  _lastSyncTs = serverData.lastModified || 0;

  // 保存到本地缓存
  try {
    localStorage.setItem('fpnl3', JSON.stringify({ ms: S.ms, cs: Array.from(S.cl), bl: S.bl }));
  } catch(e) {}

  // 刷新界面
  renderList();
  const cur = document.querySelector('#tabs .tab.act');
  if (cur) switchTab(cur.getAttribute('dt'));
  else if (S.ms.length) switchMatch(S.ms[0].id);
}

async function loadFromServer() {
  try {
    const resp = await fetch(API_BASE + '/api/data', { cache: 'no-store' });
    if (resp.ok) {
      const d = await resp.json();
      _lastSyncTs = d.lastModified || 0;
      _lastVersion = d._version || 0;
      if (d.ms && d.ms.length > 0) {
        S.ms = d.ms;
        S.cl = new Set(d.cs || []);
        S.bl = d.bl || {};
        try {
          localStorage.setItem('fpnl3', JSON.stringify({ ms: S.ms, cs: Array.from(S.cl), bl: S.bl }));
        } catch(e) {}
        setSyncStatus('online');
        return true;
      }
      setSyncStatus('online');
      return false;
    }
  } catch(e) {
    setSyncStatus('offline');
  }
  return null;
}

function loadFromLocal() {
  try {
    const d = JSON.parse(localStorage.getItem('fpnl3')||'{}');
    if (d.ms && d.ms.length > 0) {
      S.ms = d.ms;
      S.cl = new Set(d.cs || []);
      S.bl = d.bl || {};
      return true;
    }
  } catch(e) {}
  return false;
}

async function pollServerUpdate() {
  if (_isSyncing) return;
  try {
    const resp = await fetch(API_BASE + '/api/ping', { cache: 'no-store' });
    if (!resp.ok) return;
    const d = await resp.json();
    if (d._version > _lastVersion || d.lastModified > _lastSyncTs) {
      setSyncStatus('syncing');
      const loaded = await loadFromServer();
      if (loaded) {
        renderList();
        const cur = document.querySelector('#tabs .tab.act');
        if (cur) switchTab(cur.getAttribute('dt'));
        else if (S.ms.length) switchMatch(S.ms[0].id);
      }
    }
  } catch(e) {
    setSyncStatus('offline');
  }
}

function startPolling() {
  if (_pollTimer) clearInterval(_pollTimer);
  _pollTimer = setInterval(pollServerUpdate, 15000);
  document.addEventListener('visibilitychange', () => {
    if (!document.hidden) pollServerUpdate();
  });
}

function setSyncStatus(status) {
  const el = document.getElementById('syncDot');
  const txt = document.getElementById('syncText');
  if (!el || !txt) return;
  const config = {
    'online':   { color: '#22c55e', text: '已同步' },
    'syncing':  { color: '#f59e0b', text: '同步中...' },
    'offline':  { color: '#64748b', text: '离线模式' },
    'error':    { color: '#ef4444', text: '同步失败' },
    'conflict': { color: '#ef4444', text: '冲突！请刷新' }
  };
  const c = config[status] || config.offline;
  el.style.background = c.color;
  txt.textContent = c.text;
}

function load() {
  loadFromLocal();
}

async function init() {
  loadFromLocal();
  setSyncStatus('syncing');
  const serverLoaded = await loadFromServer();
  if (serverLoaded === null) {
    setSyncStatus('offline');
  } else if (serverLoaded === false && !S.ms.length) {
    S.ms.push({
      id: 'm'+Date.now(),
      h: '曼城', a: '利物浦', time: '',
      pts: ['1x2','ah','ou','cs'],
      bets: [], res: null
    });
    save();
  }
  renderPTChk(null);
  renderList();
  try {
    const ui = JSON.parse(localStorage.getItem('fpnl3_ui')||'{}');
    if (ui.cid && S.ms.find(m => m.id === ui.cid)) {
      S.cid = ui.cid;
      renderList();
    } else if (S.ms.length) {
      S.cid = S.ms[0].id;
    }
    const tab = ui.tab || (_auth && _auth.role !== 'admin' ? 'analysis' : 'setup');
    switchTab(tab);
  } catch(e) {
    if (S.cid) switchTab('setup');
    else if (S.ms.length) switchMatch(S.ms[0].id);
  }
  startPolling();
}

function exp() {
  const d = {matches:S.ms, clients:Array.from(S.cl), balances:S.bl};
  const b = new Blob([JSON.stringify(d,null,2)], {type:'application/json'});
  const u = URL.createObjectURL(b);
  const a = document.createElement('a');
  a.href = u; a.download = 'fpnl_'+new Date().toISOString().slice(0,10)+'.json';
  a.click(); URL.revokeObjectURL(u);
}

function imp() {
  const i = document.createElement('input');
  i.type = 'file'; i.accept = '.json';
  i.onchange = e => {
    const f = e.target.files[0]; if (!f) return;
    const r = new FileReader();
    r.onload = ev => {
      try {
        const d = JSON.parse(ev.target.result);
        if (d.matches) {
          S.ms = d.matches;
          S.cl = new Set(d.clients||[]);
          S.bl = d.balances || {};
          save(); renderList();
          if (S.ms.length) switchMatch(S.ms[0].id);
          alert('导入成功！');
        } else alert('格式不正确');
      } catch(err) { alert('解析失败：'+err.message); }
    };
    r.readAsText(f);
  };
  i.click();
}

async function manualSync() {
  setSyncStatus('syncing');
  const loaded = await loadFromServer();
  if (loaded) {
    renderList();
    const cur = document.querySelector('#tabs .tab.act');
    if (cur) switchTab(cur.getAttribute('dt'));
    else if (S.ms.length) switchMatch(S.ms[0].id);
  } else if (loaded === null) {
    alert('网络连接失败，当前为离线模式');
    setSyncStatus('offline');
  } else {
    setSyncStatus('online');
    alert('已是最新数据');
  }
}

(async function bootstrap() {
  const authed = await verifyStoredAuth();

    // 未登录，显示登录页
    document.getElementById('loginWrap').style.display = 'flex';
    document.getElementById('loginUser').focus();
  }
})();
